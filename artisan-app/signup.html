<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Join as Artisan · HandyHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/ui-polish.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --amb:       #D4880E;
    --amb-dark:  #B8720A;
    --amb-light: #FEF6EC;

    --white:     #ffffff;
    --grey-50:   #f7f7f7;
    --grey-100:  #f0f0f0;
    --grey-200:  #e4e4e4;
    --grey-400:  #aaaaaa;
    --grey-600:  #666666;
    --grey-900:  #111111;

    --text-primary:   var(--grey-900);
    --text-secondary: var(--grey-600);
    --text-hint:      #b8b8b8;
    --input-bg-rest:  var(--grey-50);
    --input-bg-focus: var(--white);

    --spring:   cubic-bezier(0.22, 1, 0.36, 1);
    --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);

    --r-sm:  10px;
    --r-md:  14px;
    --r-lg:  16px;
    --r-2xl: 28px;
    --r-3xl: 32px;

    --shadow-input-focus: 0 0 0 3.5px rgba(212,136,14,0.14);
    --shadow-btn:         0 8px 24px rgba(212,136,14,0.40);
    --shadow-btn-press:   0 2px  8px rgba(212,136,14,0.24);
    --shadow-card:        0 -3px 40px rgba(0,0,0,0.09);
}

html { min-height: 100%; }
body {
    display: block !important;
    padding: 0 !important;
    margin: 0 !important;
    min-height: 100dvh;
    background: #fefefe;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
}

/* ── Page shell ─────────────────────────────────────────── */
.as-page {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
}

/* ── Hero ───────────────────────────────────────────────── */
.as-hero {
    position: relative;
    overflow: hidden;
    background: #fefefe;
    padding: 0 0 52px;
    flex-shrink: 0;
}

.as-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(212,136,14,0.07) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
}

.as-hero::after {
    content: '';
    position: absolute;
    bottom: 20px;
    right: -40px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(212,136,14,0.07) 0%, transparent 70%);
    pointer-events: none;
}

/* ── Nav ────────────────────────────────────────────────── */
.as-nav {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: max(env(safe-area-inset-top, 0px), 18px) 20px 0;
}

.as-back-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.06);
    border: 1px solid rgba(0,0,0,0.09);
    border-radius: 50%;
    cursor: pointer;
    color: var(--grey-900);
    transition: background 0.18s;
    -webkit-tap-highlight-color: transparent;
}
.as-back-btn:active { background: rgba(0,0,0,0.12); }

.as-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    background: var(--amb-light);
    border: 1px solid rgba(212,136,14,0.20);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: var(--amb-dark);
    letter-spacing: 0.02em;
}

/* ── Brand ──────────────────────────────────────────────── */
.as-brand {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    padding: 18px 24px 0;
}

.as-logo {
    width: 200px;
    max-width: 75%;
    height: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
}

/* ── Form card ──────────────────────────────────────────── */
.as-card {
    flex: 1;
    background: var(--white);
    border-radius: var(--r-3xl) var(--r-3xl) 0 0;
    margin-top: -50px;
    box-shadow: var(--shadow-card);
    padding: 10px 24px 0;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.as-handle {
    width: 38px;
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin: 0 auto 22px;
    flex-shrink: 0;
}

.as-heading {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 4px;
    margin-top: 8px;
    flex-shrink: 0;
}

.as-subheading {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 24px;
    flex-shrink: 0;
}

/* ── Fields ─────────────────────────────────────────────── */
.as-field { margin-bottom: 14px; }

.as-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--grey-600);
    margin-bottom: 6px;
    letter-spacing: 0.1px;
}

.as-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
}

.as-input-icon {
    position: absolute;
    left: 14px;
    width: 17px;
    height: 17px;
    color: var(--amb);
    pointer-events: none;
    flex-shrink: 0;
    transition: color 0.2s var(--ease-out);
}

.as-input {
    width: 100%;
    height: 52px;
    padding: 0 44px 0 42px;
    border: 1.5px solid transparent;
    border-radius: var(--r-md);
    background: var(--input-bg-rest);
    font-family: inherit;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-primary);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    transition:
        background   0.2s var(--ease-out),
        border-color 0.2s var(--ease-out),
        box-shadow   0.2s var(--ease-out);
}

.as-input::placeholder {
    color: var(--text-hint);
    font-weight: 400;
    font-size: 14px;
}

.as-input-wrap:focus-within .as-input {
    background: var(--input-bg-focus);
    border-color: var(--amb);
    box-shadow: var(--shadow-input-focus);
}

.as-input-wrap:focus-within .as-input-icon { color: var(--amb); }

.as-trail-btn {
    position: absolute;
    right: 10px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--grey-400);
    border-radius: 8px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
}
.as-trail-btn:hover, .as-trail-btn:focus-visible {
    color: var(--grey-600);
    background: var(--grey-100);
}

/* Password strength */
.as-pw-strength { display: flex; gap: 4px; margin-top: 7px; }
.as-pw-bar {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--grey-200); transition: background 0.3s;
}
.as-pw-bar.weak   { background: #f59e0b; }
.as-pw-bar.fair   { background: #f59e0b; }
.as-pw-bar.good   { background: #22c55e; }
.as-pw-bar.strong { background: #16a34a; }

.as-pw-hint {
    display: flex; align-items: center; gap: 5px;
    margin-top: 6px; font-size: 11.5px; color: var(--grey-400);
    font-weight: 500; padding-left: 2px;
}
.as-pw-hint svg { flex-shrink: 0; }

/* Service category select */
.as-select {
    width: 100%;
    height: 52px;
    padding: 0 16px 0 42px;
    border: 1.5px solid transparent;
    border-radius: var(--r-md);
    background: var(--input-bg-rest);
    font-family: inherit;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    transition:
        background   0.2s var(--ease-out),
        border-color 0.2s var(--ease-out),
        box-shadow   0.2s var(--ease-out);
}
.as-select:focus {
    background: var(--input-bg-focus);
    border-color: var(--amb);
    box-shadow: var(--shadow-input-focus);
}
.as-select-chevron {
    position: absolute;
    right: 14px;
    pointer-events: none;
    color: var(--grey-400);
}

/* Terms */
.as-terms {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 6px 0 22px;
}
.as-checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--grey-200);
    border-radius: 5px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: var(--amb);
}
.as-terms-label {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5; font-weight: 400;
}
.as-terms-label a {
    color: var(--amb); font-weight: 600; text-decoration: none;
}
.as-terms-label a:hover { text-decoration: underline; }

/* Submit button */
.as-btn {
    width: 100%;
    height: 56px;
    background: var(--amb);
    color: #fff;
    border: none;
    border-radius: var(--r-lg);
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    cursor: pointer;
    box-shadow: var(--shadow-btn);
    transition:
        background  0.2s var(--ease-out),
        box-shadow  0.2s var(--ease-out),
        transform   0.12s var(--spring),
        opacity     0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
}
.as-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.09) 50%, transparent 60%);
    background-size: 200% 100%;
    background-position: -100% 0;
    transition: background-position 0.5s var(--ease-out);
}
.as-btn:hover:not(:disabled)::before { background-position: 200% 0; }
.as-btn:hover:not(:disabled) {
    background: var(--amb-dark);
    box-shadow: 0 10px 28px rgba(212,136,14,0.48);
}
.as-btn:active:not(:disabled) { transform: scale(0.975); box-shadow: var(--shadow-btn-press); }
.as-btn:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }

.as-btn-arrow {
    font-size: 18px; line-height: 1; display: inline-block;
    transition: transform 0.22s var(--spring);
}
.as-btn:hover:not(:disabled) .as-btn-arrow { transform: translateX(4px); }

.as-spin {
    display: inline-block; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.28); border-top-color: #fff;
    border-radius: 50%;
    animation: as-spin 0.65s linear infinite; flex-shrink: 0;
}
@keyframes as-spin { to { transform: rotate(360deg); } }

/* Divider + social */
.as-divider {
    display: flex; align-items: center; gap: 12px; margin: 24px 0 18px;
}
.as-divider::before, .as-divider::after {
    content: ''; flex: 1; height: 1px; background: #ebebeb;
}
.as-divider span {
    font-size: 12.5px; color: var(--grey-400); font-weight: 500; white-space: nowrap;
}

.as-social-row { display: flex; gap: 10px; }

.as-social-btn {
    flex: 1; height: 48px;
    border: 1.5px solid var(--grey-200);
    border-radius: var(--r-md);
    background: var(--white);
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s var(--spring);
    -webkit-tap-highlight-color: transparent;
}
.as-social-btn:hover:not(:disabled) {
    border-color: #c8c8c8; background: var(--grey-50);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.as-social-btn:active:not(:disabled) { transform: scale(0.96); background: var(--grey-100); }
.as-social-btn:disabled { opacity: 0.52; cursor: not-allowed; }
.as-social-btn img { width: 19px; height: 19px; object-fit: contain; flex-shrink: 0; }

/* Footer */
.as-footer { margin-top: auto; padding-top: 24px; }
.as-footer-inner {
    border-radius: 20px 20px 0 0;
    padding: 18px 0;
    padding-bottom: max(18px, env(safe-area-inset-bottom));
    text-align: center;
    margin: 0 -24px;
}
.as-footer-text { font-size: 14px; color: var(--text-secondary); }
.as-footer-link {
    font-size: 14px; font-weight: 700; color: var(--amb); text-decoration: none;
    -webkit-tap-highlight-color: transparent;
}
.as-footer-link:active { opacity: 0.65; }

/* Animations */
@keyframes as-hero-in { from { opacity:0 } to { opacity:1 } }
@keyframes as-card-in {
    from { opacity:0; transform:translateY(44px) }
    to   { opacity:1; transform:translateY(0) }
}
@keyframes as-fade-up {
    from { opacity:0; transform:translateY(12px) }
    to   { opacity:1; transform:translateY(0) }
}

.as-hero { animation: as-hero-in 0.4s var(--ease-out) both; }
.as-card { animation: as-card-in 0.52s var(--spring) 0.08s both; }

.as-a1 { animation: as-fade-up 0.42s var(--spring) 0.20s both; }
.as-a2 { animation: as-fade-up 0.42s var(--spring) 0.26s both; }
.as-a3 { animation: as-fade-up 0.42s var(--spring) 0.31s both; }
.as-a4 { animation: as-fade-up 0.42s var(--spring) 0.36s both; }
.as-a5 { animation: as-fade-up 0.42s var(--spring) 0.41s both; }
.as-a6 { animation: as-fade-up 0.42s var(--spring) 0.46s both; }
.as-a7 { animation: as-fade-up 0.42s var(--spring) 0.51s both; }
.as-a8 { animation: as-fade-up 0.42s var(--spring) 0.56s both; }

@media (prefers-reduced-motion: reduce) {
    .as-hero, .as-card,
    .as-a1,.as-a2,.as-a3,.as-a4,
    .as-a5,.as-a6,.as-a7,.as-a8 {
        animation: none !important; opacity: 1 !important; transform: none !important;
    }
}

@media (min-width: 431px) {
    body { background: #d8d0c8 !important; }
    .as-page {
        margin-top: 32px; margin-bottom: 32px;
        min-height: auto; border-radius: var(--r-2xl);
        overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.36);
    }
    .as-card { border-radius: var(--r-3xl); margin-top: -28px; }
}
</style>
</head>
<body>

<div class="as-page">

    <!-- ══ HERO ═══════════════════════════════════════════════ -->
    <div class="as-hero">

        <nav class="as-nav">
            <button class="as-back-btn" aria-label="Back to home"
                    onclick="window.location.href='../customer-app/index.html'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.3"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="as-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                    <rect x="2" y="7" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                    <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="currentColor" stroke-width="2"/>
                </svg>
                Artisan Portal
            </div>
        </nav>

        <div class="as-brand">
            <img class="as-logo"
                 src="../shared/assets/images/handyhub-logo-text.png"
                 alt="HandyHub — Trusted Professionals, Right Around You."
                 onerror="this.onerror=null;this.style.display='none';this.insertAdjacentHTML('afterend','<span style=&quot;font-weight:800;font-size:22px;color:#730201;letter-spacing:-0.5px;&quot;>HandyHub</span>')">
        </div>

    </div><!-- /.as-hero -->


    <!-- ══ FORM CARD ══════════════════════════════════════════ -->
    <div class="as-card">

        <div class="as-handle"></div>

        <h2 class="as-heading as-a1">Create Artisan Account</h2>
        <p class="as-subheading as-a1">Join HandyHub and grow your business.</p>

        <form id="artisan-signup-form" action="#" method="POST" novalidate autocomplete="on">

            <!-- Full Name -->
            <div class="as-field as-a2">
                <label class="as-label" for="as-name">Full Name</label>
                <div class="as-input-wrap">
                    <svg class="as-input-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                    </svg>
                    <input class="as-input" type="text" id="as-name"
                           placeholder="Enter your full name"
                           autocomplete="name" required>
                </div>
            </div>

            <!-- Email -->
            <div class="as-field as-a2">
                <label class="as-label" for="as-email">Email Address</label>
                <div class="as-input-wrap">
                    <svg class="as-input-icon" viewBox="0 0 24 24" fill="none">
                        <rect x="2" y="4" width="20" height="16" rx="2"
                              stroke="currentColor" stroke-width="1.8"/>
                        <path d="M2 7l10 7 10-7"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <input class="as-input" type="email" id="as-email"
                           placeholder="Enter your email"
                           autocomplete="email" inputmode="email" required>
                </div>
            </div>

            <!-- Phone -->
            <div class="as-field as-a3">
                <label class="as-label" for="as-phone">Phone Number</label>
                <div class="as-input-wrap">
                    <svg class="as-input-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <input class="as-input" type="tel" id="as-phone"
                           placeholder="e.g. 0244 000 000"
                           autocomplete="tel" inputmode="tel">
                </div>
            </div>

            <!-- Service Category -->
            <div class="as-field as-a3">
                <label class="as-label" for="as-category">Primary Service</label>
                <div class="as-input-wrap">
                    <svg class="as-input-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <select class="as-select" id="as-category" required>
                        <option value="" disabled selected>Select your trade</option>
                        <option value="electrical">Electrical</option>
                        <option value="plumbing">Plumbing</option>
                        <option value="carpentry">Carpentry</option>
                        <option value="painting">Painting</option>
                        <option value="welding">Welding</option>
                        <option value="ac_cooling">A/C & Cooling</option>
                        <option value="tiling">Tiling</option>
                        <option value="cleaning">Cleaning</option>
                        <option value="other">Other</option>
                    </select>
                    <svg class="as-select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
                              stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <!-- "Other" expand panel — visible only when Other is selected -->
            <div id="as-other-panel" style="display:none;background:var(--surface-2,#F9FAFB);border:1px solid var(--border,#E5E7EB);border-radius:12px;padding:14px 16px;margin-top:-4px;">
                <p style="font-size:12px;font-weight:600;color:var(--text-mid,#6B7280);margin:0 0 12px;">
                    Tell us more — we'll review it within 48 hrs
                </p>

                <!-- What they actually do -->
                <div style="margin-bottom:12px;">
                    <label class="as-label" for="as-other-desc" style="margin-bottom:6px;display:block;">
                        Describe your specialty <span style="color:#EF4444;">*</span>
                    </label>
                    <div class="as-input-wrap">
                        <input class="as-input" type="text" id="as-other-desc"
                               placeholder="e.g. Solar Inverter Installation"
                               maxlength="120" autocomplete="off">
                    </div>
                </div>

                <!-- Best-fit bucket so they can still be dispatched now -->
                <div>
                    <label class="as-label" for="as-other-bucket" style="margin-bottom:6px;display:block;">
                        Closest existing category <span style="color:#EF4444;">*</span>
                    </label>
                    <p style="font-size:11px;color:var(--text-dim,#9CA3AF);margin:0 0 6px;">
                        You'll receive jobs in this category while your trade is being reviewed.
                    </p>
                    <div class="as-input-wrap">
                        <select class="as-select" id="as-other-bucket">
                            <option value="" disabled selected>Select closest trade</option>
                            <option value="electrical">Electrical</option>
                            <option value="plumbing">Plumbing</option>
                            <option value="carpentry">Carpentry</option>
                            <option value="painting">Painting</option>
                            <option value="welding">Welding</option>
                            <option value="ac_cooling">A/C &amp; Cooling</option>
                            <option value="tiling">Tiling</option>
                            <option value="cleaning">Cleaning</option>
                        </select>
                        <svg class="as-select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
                                  stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Password -->
            <div class="as-field as-a4">
                <label class="as-label" for="as-pass">Password</label>
                <div class="as-input-wrap">
                    <svg class="as-input-icon" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="11" width="18" height="11" rx="2"
                              stroke="currentColor" stroke-width="1.8"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    <input class="as-input" type="password" id="as-pass"
                           placeholder="Create a password"
                           autocomplete="new-password" required>
                    <button type="button" class="as-trail-btn" id="as-toggle-pw"
                            aria-label="Show password">
                        <svg id="as-pw-eye" width="17" height="17" viewBox="0 0 24 24" fill="none">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                                  stroke="currentColor" stroke-width="1.8"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                        </svg>
                    </button>
                </div>
                <div class="as-pw-strength" id="as-pw-strength" aria-hidden="true">
                    <div class="as-pw-bar" id="as-bar-1"></div>
                    <div class="as-pw-bar" id="as-bar-2"></div>
                    <div class="as-pw-bar" id="as-bar-3"></div>
                    <div class="as-pw-bar" id="as-bar-4"></div>
                </div>
                <div class="as-pw-hint">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                    At least 8 characters
                </div>
            </div>

            <!-- Terms -->
            <div class="as-terms as-a5">
                <input class="as-checkbox terms-row" type="checkbox" id="as-terms"
                       aria-label="Agree to terms">
                <label class="as-terms-label" for="as-terms">
                    I agree to the
                    <a href="#">Terms of Service</a>
                    and
                    <a href="#">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit -->
            <div class="as-a5">
                <button type="submit" id="as-submit-btn" class="as-btn" disabled>
                    Create Account
                    <span class="as-btn-arrow" aria-hidden="true">→</span>
                </button>
            </div>

        </form>

        <!-- Divider -->
        <div class="as-divider as-a6"><span>or continue with</span></div>

        <!-- Social -->
        <div class="as-social-row as-a6">
            <button type="button" id="as-google-btn" class="as-social-btn"
                    aria-label="Sign up with Google">
                <img src="https://img.icons8.com/color/48/google-logo.png" alt="Google">
                Google
            </button>
            <button type="button" class="as-social-btn" disabled
                    aria-label="More options coming soon"
                    title="More options coming soon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
                </svg>
                More
            </button>
        </div>

        <!-- Footer -->
        <footer class="as-footer as-a7">
            <div class="as-footer-inner">
                <p class="as-footer-text">
                    Already have an account?&nbsp;
                    <a class="as-footer-link" href="login.html">Login &rsaquo;</a>
                </p>
            </div>
        </footer>

    </div><!-- /.as-card -->

</div><!-- /.as-page -->


<!-- ══ SCRIPTS ════════════════════════════════════════════════ -->
<script src="../shared/js/utils/global-app.js"></script>
<script src="../shared/js/components/fastLoader.js"></script>

<script type="module">
import { getAppContainer } from '../shared/js/app/container.js';

const ICON_OPEN   = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>';
const ICON_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>';

/* ── Eye toggle ───────────────────────────────────────────── */
const togglePwBtn = document.getElementById('as-toggle-pw');
const pwInput     = document.getElementById('as-pass');
const pwEye       = document.getElementById('as-pw-eye');
if (togglePwBtn && pwInput && pwEye) {
    togglePwBtn.addEventListener('click', () => {
        const hidden = pwInput.type === 'password';
        pwInput.type    = hidden ? 'text' : 'password';
        pwEye.innerHTML = hidden ? ICON_CLOSED : ICON_OPEN;
        togglePwBtn.setAttribute('aria-label', hidden ? 'Hide password' : 'Show password');
    });
}

/* ── Password strength ────────────────────────────────────── */
const bars = ['as-bar-1','as-bar-2','as-bar-3','as-bar-4'].map(id => document.getElementById(id));
const LEVELS = ['', 'weak', 'fair', 'good', 'strong'];
function getStrength(pw) {
    if (!pw || pw.length < 4) return 0;
    let s = 0;
    if (pw.length >= 8)  s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw) || /[^A-Za-z0-9]/.test(pw)) s++;
    return Math.min(s, 4);
}
if (pwInput && bars[0]) {
    pwInput.addEventListener('input', () => {
        const s = getStrength(pwInput.value);
        bars.forEach((bar, i) => {
            bar.className = 'as-pw-bar';
            if (i < s) bar.classList.add(LEVELS[s]);
        });
    });
}

/* ── Submit enable/disable ────────────────────────────────── */
const form      = document.getElementById('artisan-signup-form');
const submitBtn = document.getElementById('as-submit-btn');
const termsChk  = document.getElementById('as-terms');
const nameInp   = document.getElementById('as-name');
const emailInp  = document.getElementById('as-email');
const catInp    = document.getElementById('as-category');

function checkReady() {
    const isOther  = catInp.value === 'other';
    const otherDesc   = document.getElementById('as-other-desc');
    const otherBucket = document.getElementById('as-other-bucket');
    const otherOk  = !isOther || (
        otherDesc   && otherDesc.value.trim().length > 0 &&
        otherBucket && otherBucket.value !== ''
    );
    const ready =
        nameInp.value.trim().length > 0 &&
        emailInp.value.includes('@') &&
        catInp.value !== '' &&
        otherOk &&
        pwInput.value.length >= 8 &&
        termsChk.checked;
    submitBtn.disabled = !ready;
}

[nameInp, emailInp, pwInput, termsChk].forEach(el => {
    el.addEventListener('input',  checkReady);
    el.addEventListener('change', checkReady);
});

catInp.addEventListener('change', () => {
    const panel = document.getElementById('as-other-panel');
    panel.style.display = catInp.value === 'other' ? 'block' : 'none';
    checkReady();
});

document.getElementById('as-other-desc').addEventListener('input', checkReady);
document.getElementById('as-other-bucket').addEventListener('change', checkReady);

/* ── Form submit ──────────────────────────────────────────── */
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="as-spin"></span>';

    try {
        const { services: { authService, databaseService } } = getAppContainer();
        const email    = emailInp.value.trim();
        const password = pwInput.value;
        const name     = nameInp.value.trim();
        const phone    = document.getElementById('as-phone').value.trim();
        const selected = catInp.value;

        // "Other" artisans get dispatched under their best-fit bucket
        // while their custom specialty waits for admin review.
        const isOther          = selected === 'other';
        const category         = isOther
            ? document.getElementById('as-other-bucket').value
            : selected;
        const requestedService = isOther
            ? document.getElementById('as-other-desc').value.trim()
            : null;

        const cred = await authService.createUserWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;
        const now  = new Date().toISOString();

        const artisanDoc = {
            uid,
            fullName:           name,
            email,
            phone,
            category,
            isOnline:           false,
            isAvailable:        false,
            verificationStatus: 'draft',
            rating:             0,
            reviewCount:        0,
            jobsCompleted:      0,
            createdAt:          now,
        };
        if (requestedService) artisanDoc.requestedService = requestedService;

        await databaseService.setDocument('artisans', uid, artisanDoc);

        // Write to admin review queue — non-critical, never blocks signup
        if (requestedService) {
            databaseService.setDocument('service_requests', uid, {
                artisanId:           uid,
                artisanName:         name,
                requestedService,
                operationalCategory: category,
                status:              'pending',
                createdAt:           now,
            }).catch(e => console.warn('[signup] service_requests:', e.message));
        }

        window.location.replace('dashboard.html');
    } catch (err) {
        submitBtn.disabled   = false;
        submitBtn.innerHTML  = 'Create Account <span class="as-btn-arrow">→</span>';
        alert(err.message || 'Sign-up failed. Please try again.');
    }
});

/* ── Google sign-up ───────────────────────────────────────── */
const googleBtn = document.getElementById('as-google-btn');
if (googleBtn) {
    googleBtn.addEventListener('click', async () => {
        googleBtn.disabled = true;
        try {
            const { services: { authService } } = getAppContainer();
            await authService.signInWithGoogle();
            window.location.replace('dashboard.html');
        } catch (err) {
            googleBtn.disabled = false;
            alert(err.message || 'Google sign-in failed.');
        }
    });
}
</script>

</body>
</html>
