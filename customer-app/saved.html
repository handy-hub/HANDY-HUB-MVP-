<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="../shared/js/utils/themeManager.js"></script>
  <script src="../shared/js/services/stateService.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved | HandyHub</title>
  <link rel="stylesheet" href="css/saved.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel='stylesheet' href='../shared/css/ui-polish.css' />
  <style>
    .sv-search-bar {
      display: none;
      padding: 8px 16px 12px;
      background: var(--surface, #fff);
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .sv-search-bar.open { display: block; }
    .sv-search-input {
      width: 100%;
      background: #f5f5f5;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      color: #111;
    }
    .sv-tab-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fde8e8;
      color: #730201;
      font-size: 9px;
      font-weight: 800;
      border-radius: 8px;
      padding: 1px 5px;
      margin-left: 4px;
      min-width: 16px;
    }

    /* ── Skeleton loading ── */
    .sv-skel-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--surface, #fff);
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .sv-skel-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: sv-shimmer 1.4s infinite;
      flex-shrink: 0;
    }
    .sv-skel-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .sv-skel-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: sv-shimmer 1.4s infinite;
    }
    .sv-skel-line.short { width: 55%; }
    .sv-skel-line.shorter { width: 38%; }
    @keyframes sv-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    [data-theme="dark"] .sv-skel-avatar,
    [data-theme="dark"] .sv-skel-line {
      background: linear-gradient(90deg, #2a2a2a 25%, #333 50%, #2a2a2a 75%);
      background-size: 200% 100%;
      animation: sv-shimmer 1.4s infinite;
    }
  </style>
</head>
<body>
<div class="sv-shell">

  <!-- Header -->
  <div class="sv-header">
    <h1 class="sv-title">Saved</h1>
    <div class="sv-header-btns">
      <button class="sv-icon-btn" id="sv-search-toggle" aria-label="Search">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Search bar -->
  <div class="sv-search-bar" id="sv-search-bar">
    <input type="text" class="sv-search-input" id="sv-search-input" placeholder="Search saved items…" autocomplete="off">
  </div>

  <!-- Body -->
  <div class="sv-body">

    <!-- Tabs -->
    <div class="sv-tabs" role="tablist">
      <button class="sv-tab active" id="tab-professionals" onclick="switchTab('professionals', this)" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/>
        </svg>
        Professionals<span class="sv-tab-count" id="count-professionals">0</span>
      </button>
      <button class="sv-tab" id="tab-services" onclick="switchTab('services', this)" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Services<span class="sv-tab-count" id="count-services">0</span>
      </button>
      <button class="sv-tab" id="tab-offers" onclick="switchTab('offers', this)" role="tab">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/>
          <circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        Offers
      </button>
    </div>

    <!-- ── PROFESSIONALS PANEL ── -->
    <div class="sv-panel active" id="panel-professionals">
      <div class="sv-section">
        <div class="sv-section-head">
          <h2 class="sv-section-title">Saved Professionals</h2>
        </div>
        <div id="list-saved-pros">
          <!-- skeleton while loading -->
          <div class="sv-skel-card"><div class="sv-skel-avatar"></div><div class="sv-skel-lines"><div class="sv-skel-line"></div><div class="sv-skel-line short"></div><div class="sv-skel-line shorter"></div></div></div>
          <div class="sv-skel-card"><div class="sv-skel-avatar"></div><div class="sv-skel-lines"><div class="sv-skel-line"></div><div class="sv-skel-line short"></div><div class="sv-skel-line shorter"></div></div></div>
        </div>
      </div>
    </div>

    <!-- ── SERVICES PANEL ── -->
    <div class="sv-panel" id="panel-services">
      <div class="sv-section">
        <div class="sv-section-head">
          <h2 class="sv-section-title">Saved Services</h2>
        </div>
        <div id="list-saved-services">
          <div class="sv-skel-card"><div class="sv-skel-avatar" style="border-radius:12px;width:44px;height:44px;"></div><div class="sv-skel-lines"><div class="sv-skel-line"></div><div class="sv-skel-line short"></div></div></div>
          <div class="sv-skel-card"><div class="sv-skel-avatar" style="border-radius:12px;width:44px;height:44px;"></div><div class="sv-skel-lines"><div class="sv-skel-line"></div><div class="sv-skel-line short"></div></div></div>
        </div>
      </div>
    </div>

    <!-- ── OFFERS PANEL ── -->
    <div class="sv-panel" id="panel-offers">
      <div class="sv-empty">
        <div class="sv-empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z" stroke="#730201" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="7" cy="7" r="1.5" fill="#730201"/>
          </svg>
        </div>
        <p class="sv-empty-title">No Saved Offers</p>
        <p class="sv-empty-sub">Browse available offers and save the ones you love for easy access anytime.</p>
      </div>
    </div>

  </div>
</div>

<script src="../shared/js/utils/global-app.js"></script>
<script src="../shared/js/components/floatingNav.js"></script>
<script>
(function () {
  'use strict';

  /* ── In-memory state (populated by Firestore subscription) ── */
  window._svPros   = [];   // array of saved professional objects
  window._svSvcs   = [];   // array of saved service objects
  window._svUid    = null; // current user UID — set by module script
  window._svFilter = '';   // current search filter

  const TOAST_ICONS = {
    success: '<svg viewBox="0 0 24 24" fill="none"><path d="M20 7L10.25 16.75L6 12.5" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 10V16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="M12 7.6V7.65" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>',
  };

  /* ── Renderers ── */
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function _svPhoto(p) {
    if (p && p.profileImageId) {
      const v = p.profileImageVersion ? `v${p.profileImageVersion}/` : '';
      return `https://res.cloudinary.com/dnwwglbl9/image/upload/${v}w_80,h_80,c_fill,f_auto,q_auto,r_max/${p.profileImageId}`;
    }
    return (p && p.profileImage) || null;
  }

  function proCardHtml(pro) {
    const initials    = (pro.name || '?').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
    const _svPhotoSrc = _svPhoto(pro);
    const avatarHtml  = _svPhotoSrc
      ? `<img src="${escHtml(_svPhotoSrc)}" alt="${escHtml(pro.name)}" class="sv-pro-photo" style="object-fit:cover;">`
      : `<div class="sv-pro-photo" style="background:linear-gradient(135deg,#730201,#a03030);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;border-radius:50%;">${initials}</div>`;

    const rating    = pro.rating != null ? Number(pro.rating).toFixed(1) : null;
    const reviews   = pro.reviewCount || 0;

    return `
    <div class="sv-pro-card" data-id="${escHtml(pro.id)}">
      <div class="sv-pro-main">
        <div class="sv-pro-photo-wrap">
          ${avatarHtml}
          ${pro.isOnline ? '<span class="sv-pro-dot"></span>' : ''}
        </div>
        <div class="sv-pro-info">
          <div class="sv-pro-name-row">
            <span class="sv-pro-name">${escHtml(pro.name)}</span>
            <span class="sv-verified" aria-label="Verified">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M20 7L10.25 16.75L4 10.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
            </span>
          </div>
          <p class="sv-pro-role">${escHtml(pro.specialty || pro.category || 'Artisan')}</p>
          ${rating ? `<div class="sv-pro-rating">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="#f5a623"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span><strong>${rating}</strong>${reviews ? ' (' + reviews + ' reviews)' : ''}</span>
          </div>` : ''}
          ${pro.location ? `<div class="sv-pro-dist">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0Z" stroke="#888" stroke-width="1.8"/><circle cx="12" cy="10" r="3" stroke="#888" stroke-width="1.8"/></svg>
            <span>${escHtml(pro.location)}</span>
          </div>` : ''}
        </div>
      </div>
      <div class="sv-pro-actions">
        <button class="sv-bookmark-btn" aria-label="Remove from saved" onclick="unsavePro('${escHtml(pro.id)}', this)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#730201"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2Z" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="sv-book-btn" onclick="bookPro('${escHtml(pro.id)}')">Book Now</button>
      </div>
    </div>`;
  }

  const SVC_ICONS = {
    Plumbing:   '<path d="M12 2C9.24 2 7 4.24 7 7c0 2.85 2.92 6.21 4.53 8.02.26.3.68.3.94 0C14.08 13.21 17 9.85 17 7c0-2.76-2.24-5-5-5z" stroke="#730201" stroke-width="1.8" fill="#730201" fill-opacity=".15"/><circle cx="12" cy="7" r="2" fill="#730201"/>',
    Electrical: '<path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="#730201" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="#730201" fill-opacity=".15"/>',
    Carpentry:  '<path d="M15 4v16M3 8h12M3 16h8M3 4v16" stroke="#730201" stroke-width="2" stroke-linecap="round"/>',
    Cleaning:   '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#730201" stroke-width="2"/><path d="M9 22V12h6v10" stroke="#730201" stroke-width="2" stroke-linecap="round"/>',
    default:    '<rect x="3" y="3" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/>',
  };

  function svcCardHtml(svc) {
    const icon = SVC_ICONS[svc.category] || SVC_ICONS.default;
    return `
    <div class="sv-svc-card" data-id="${escHtml(svc.id)}">
      <div class="sv-svc-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">${icon}</svg>
      </div>
      <div class="sv-svc-info">
        <p class="sv-svc-name">${escHtml(svc.name)}</p>
        <p class="sv-svc-desc">${escHtml(svc.desc || svc.description || '')}</p>
      </div>
      <button class="sv-bookmark-btn" aria-label="Remove service" onclick="unsaveSvc('${escHtml(svc.id)}', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#730201"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2Z" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>`;
  }

  function emptyPros() {
    return `<div class="sv-empty">
      <div class="sv-empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z" stroke="#730201" stroke-width="2"/></svg></div>
      <p class="sv-empty-title">No Saved Professionals</p>
      <p class="sv-empty-sub">Browse professionals and tap the bookmark icon to save them here.</p>
      <button class="sv-empty-btn" onclick="window.location.href='book-now.html'">Find Professionals</button>
    </div>`;
  }

  function emptySvcs() {
    return `<div class="sv-empty">
      <div class="sv-empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="#730201" stroke-width="2"/></svg></div>
      <p class="sv-empty-title">No Saved Services</p>
      <p class="sv-empty-sub">Save services you use often for quick access next time.</p>
      <button class="sv-empty-btn" onclick="window.location.href='book-step1.html'">Browse Services</button>
    </div>`;
  }

  /* ── Main render (called by module script when Firestore data changes) ── */
  window.svRender = function(filter) {
    const q    = (filter || '').toLowerCase().trim();
    window._svFilter = q;
    const pros = q
      ? (window._svPros || []).filter(p =>
          (p.name || '').toLowerCase().includes(q) ||
          (p.specialty || p.category || '').toLowerCase().includes(q))
      : (window._svPros || []);
    const svcs = q
      ? (window._svSvcs || []).filter(s =>
          (s.name || '').toLowerCase().includes(q) ||
          (s.desc || s.description || '').toLowerCase().includes(q))
      : (window._svSvcs || []);

    document.getElementById('list-saved-pros').innerHTML      = pros.length ? pros.map(proCardHtml).join('') : emptyPros();
    document.getElementById('list-saved-services').innerHTML  = svcs.length ? svcs.map(svcCardHtml).join('') : emptySvcs();
    document.getElementById('count-professionals').textContent = (window._svPros || []).length;
    document.getElementById('count-services').textContent      = (window._svSvcs || []).length;
  };

  /* ── Actions (use dynamic import so they work from this non-module script) ── */

  window.unsavePro = function (id, btn) {
    const card = btn.closest('.sv-pro-card');
    if (card) {
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity    = '0';
      card.style.transform  = 'translateX(40px)';
    }
    setTimeout(function () {
      if (!window._svUid) return;
      const newPros = (window._svPros || []).filter(function (p) { return p.id !== id; });
      import('../shared/js/app/container.js').then(function (mod) {
        mod.getAppContainer().services.databaseService.updateDocument('customers', window._svUid, {
          savedProfessionals: newPros,
          updatedAt: new Date().toISOString(),
        }).catch(function (err) { console.warn('[saved] unsavePro error:', err); });
      });
      // Optimistic update — subscription will confirm
      window._svPros = newPros;
      window.svRender(window._svFilter);
      showToast('Removed from saved', 'info');
    }, 300);
  };

  window.unsaveSvc = function (id, btn) {
    const card = btn.closest('.sv-svc-card');
    if (card) {
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity    = '0';
      card.style.transform  = 'translateX(40px)';
    }
    setTimeout(function () {
      if (!window._svUid) return;
      const newSvcs = (window._svSvcs || []).filter(function (s) { return s.id !== id; });
      import('../shared/js/app/container.js').then(function (mod) {
        mod.getAppContainer().services.databaseService.updateDocument('customers', window._svUid, {
          savedServices: newSvcs,
          updatedAt: new Date().toISOString(),
        }).catch(function (err) { console.warn('[saved] unsaveSvc error:', err); });
      });
      window._svSvcs = newSvcs;
      window.svRender(window._svFilter);
      showToast('Removed from saved', 'info');
    }, 300);
  };

  window.bookPro = function (id) {
    const pro = (window._svPros || []).find(function (p) { return p.id === id; });
    if (pro && window.HH_State) {
      window.HH_State.booking.patch({
        professional: {
          id:      pro.id,
          name:    pro.name,
          type:    pro.specialty || pro.category || '',
          rating:  pro.rating,
          reviews: pro.reviewCount,
          photo:   _svPhoto(pro),
        },
      });
    }
    window.location.href = 'book-now.html';
  };

  /* ── Tab switch ── */
  window.switchTab = function (panel, btn) {
    document.querySelectorAll('.sv-tab').forEach(function (t) { t.classList.remove('active'); });
    btn.classList.add('active');
    document.querySelectorAll('.sv-panel').forEach(function (p) { p.classList.remove('active'); });
    document.getElementById('panel-' + panel).classList.add('active');
  };

  /* ── Search ── */
  document.getElementById('sv-search-toggle').addEventListener('click', function () {
    const bar = document.getElementById('sv-search-bar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open')) {
      document.getElementById('sv-search-input').focus();
    } else {
      document.getElementById('sv-search-input').value = '';
      window.svRender('');
    }
  });
  document.getElementById('sv-search-input').addEventListener('input', function () {
    window.svRender(this.value);
  });

  /* ── Toast ── */
  function showToast(msg, type) {
    document.querySelector('.toast.app-toast')?.remove();
    const t    = document.createElement('div');
    t.className = 'toast app-toast ' + type;
    t.setAttribute('role', 'status');
    t.setAttribute('aria-live', 'polite');
    const icon = document.createElement('span');
    icon.className = 'toast-icon';
    icon.innerHTML = TOAST_ICONS[type] || TOAST_ICONS.info;
    const text = document.createElement('span');
    text.className  = 'toast-message';
    text.textContent = msg;
    t.append(icon, text);
    document.body.appendChild(t);
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(function () {
      t.classList.add('toast-exit');
      setTimeout(function () { t.remove(); }, 320);
    }, 3000);
  }

})();
</script>

<!-- ── Module script: auth + Firestore real-time subscription ── -->
<script type="module" src="js/pages/savedPage.js"></script>

<!-- ── Global helpers: called from book-step2.html and other pages ──
     These write directly to Firestore so saves persist across sessions. ── -->
<script type="module" src="js/savedHelpers.js"></script>
<script type="module" src="js/authInit.js"></script>
</body>
</html>
