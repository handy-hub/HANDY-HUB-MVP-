<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="../shared/js/utils/themeManager.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | HandyHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/pageTransitions.css">
    <link rel="stylesheet" href="css/notification.css">

  <link rel='stylesheet' href='../shared/css/ui-polish.css' />
</head>
<body data-page-type="notification">

    <div class="notif-page">

        <!-- ── Header ─────────────────────────────────────────────────── -->
        <header class="notif-header">
            <button class="back-to-dashboard header-icon-btn" onclick="history.length > 1 ? history.back() : window.location.href='dashboard.html'" aria-label="Go back">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="notif-header__title">Notifications</h1>
            <div class="notif-header-actions">
                <button class="header-icon-btn" id="markAllReadBtn"
                    aria-label="Mark all as read" style="display:none" title="Mark all read">
                    <i class="fa-solid fa-check-double"></i>
                </button>
                <button class="header-icon-btn" aria-label="Notification Settings"
                    onclick="sessionStorage.setItem('notif_settings_ref','notification.html'); window.location.href='settings-notifications.html'">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </header>

        <!-- ── Filter tabs (rendered by JS) ──────────────────────────── -->
        <div class="tabs-scroll" id="tabContainer" role="tablist"></div>

        <!-- ── Notification list (rendered by JS) ────────────────────── -->
        <main class="notif-main">
            <div id="notif-list"></div>

            <!-- Push-notification upsell card -->
            <div class="push-alert" id="pushBox">
                <button class="push-alert__close" id="push-close-btn" aria-label="Dismiss">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="push-alert__body">
                    <img class="push-alert__img"
                         src="https://img.icons8.com/color/96/bell.png"
                         alt=""
                         loading="lazy">
                    <div class="push-alert__text">
                        <p class="push-alert__heading">Want real-time updates?</p>
                        <p class="push-alert__sub">Turn on push notifications to never miss important updates.</p>
                    </div>
                    <button class="push-alert__btn">Enable</button>
                </div>
            </div>
        </main>

    </div>


    <!-- ── Scripts ───────────────────────────────────────────────────── -->
    <script src="../shared/js/components/pageTransition.js"></script>
    <script src="../shared/js/utils/global-app.js"></script>

    <!-- Auth guard — must run before page init -->
    <script type="module">
      import { requireAuth } from '../shared/js/utils/authGuard.js';
      await requireAuth();
    </script>

    <!-- Notification logic as an ES module (needs Firebase imports) -->
    <script type="module" src="js/pages/notificationPage.js"></script>

<script src="../shared/js/components/fastLoader.js"></script>
<script src="../shared/js/components/floatingNav.js"></script>
</body>
</html>
