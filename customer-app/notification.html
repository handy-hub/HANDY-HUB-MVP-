<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/pageTransitions.css">
    <link rel="stylesheet" href="css/notification.css">
</head>
<body class="flex justify-center" data-page-type="notification">

    <div class="w-full max-w-md min-h-screen relative flex flex-col pb-24">
        
        <!-- Header -->
        <header class="glass-header sticky top-0 flex items-center justify-between px-6 py-4">
            <button class="back-to-dashboard text-xl"><i class="fa-solid fa-chevron-left"></i></button>
            <h1 class="text-lg font-bold">Notifications</h1>
            <button class="text-xl"><i class="fa-solid fa-gear"></i></button>
        </header>

        <!-- Filter Tabs -->
        <div class="flex space-x-4 px-4 py-4 overflow-x-auto no-scrollbar" id="tabContainer">
            <!-- Tabs injected by JS -->
        </div>

        <!-- Main Content -->
        <main class="flex-1 px-4">
            <div id="notif-list">
                <!-- Notifications injected by JS -->
            </div>

            <!-- Push Alert Box -->
            <div class="mt-8 border border-gray-100 rounded-2xl p-4 flex items-center space-x-4 relative bg-gray-50/50" id="pushBox">
                <button id="push-close-btn" class="absolute top-2 right-3 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
                <div class="relative">
                    <img src="https://img.icons8.com/color/96/bell.png" class="w-14 h-14" alt="bell">
                </div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm">Want real-time updates?</h4>
                    <p class="text-[11px] text-gray-500 mt-1 leading-tight">Turn on push notifications to never miss important updates.</p>
                </div>
                <button class="bg-[#b10c0c] text-white px-5 py-2 rounded-lg text-xs font-bold">Enable</button>
            </div>
        </main>


    </div>
<script src="../shared/js/components/navLoader.js"></script>
<script src="../shared/js/components/pageTransition.js"></script>
<script src="js/pages/notificationPage.js"></script>
    <script src="../shared/js/utils/global-app.js"></script>
