<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="../shared/js/utils/themeManager.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications · HandyHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../shared/css/pageTransitions.css">
    <link rel="stylesheet" href="css/notification.css">
    <script src="../shared/js/utils/themeManager.js"></script>
</head>
<body data-page-type="notification">

    <div class="notif-page">

        <!-- ── Header ─────────────────────────────────────────────────── -->
        <header class="notif-header">
            <button class="back-to-dashboard header-icon-btn" aria-label="Go back">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="notif-header__title">Notifications</h1>
            <button class="header-icon-btn" aria-label="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
        </header>

        <!-- ── Filter tabs (rendered by JS) ──────────────────────────── -->
        <div class="tabs-scroll" id="tabContainer" role="tablist"></div>

        <!-- ── Notification list (rendered by JS) ────────────────────── -->
        <main class="notif-main">
            <div id="notif-list"></div>

            <!-- Push-notification upsell card -->
            <div class="push-alert" id="pushBox">
                <button class="push-alert__close" id="push-close-btn" aria-label="Dismiss">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="push-alert__body">
                    <img class="push-alert__img"
                         src="https://img.icons8.com/color/96/bell.png"
                         alt=""
                         loading="lazy">
                    <div class="push-alert__text">
                        <p class="push-alert__heading">Want real-time updates?</p>
                        <p class="push-alert__sub">Turn on push notifications to never miss important updates.</p>
                    </div>
                    <button class="push-alert__btn">Enable</button>
                </div>
            </div>
        </main>

    </div>

    <!-- ── Bottom Nav ────────────────────────────────────────────────── -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="9 22 9 12 15 12 15 22" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Home</span>
        </a>
        <a href="booking.html" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1" stroke="#aaa" stroke-width="1.7"/>
                <path d="M9 12h6M9 16h4" stroke="#aaa" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <span>Bookings</span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Messages</span>
        </a>
        <a href="saved.html" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Saved</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="7" r="4" stroke="#aaa" stroke-width="1.7"/>
            </svg>
            <span>Profile</span>
        </a>
    </nav>

    <!-- ── Scripts ───────────────────────────────────────────────────── -->
    <script src="../shared/js/components/pageTransition.js"></script>
    <script src="../shared/js/utils/global-app.js"></script>

    <!-- Notification logic as an ES module (needs Firebase imports) -->
    <script type="module" src="js/pages/notificationPage.js"></script>

</body>
</html>
