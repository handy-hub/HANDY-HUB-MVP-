<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyHub | Get Started</title>
    <link rel="stylesheet" href="css/customer.css">
    <link rel="preload" as="image" href="../shared/assets/images/customer-img.png">


  <link rel='stylesheet' href='../shared/css/ui-polish.css' />
</head>
<body>
    <div  class="app">
        <section class="header-image">
            <center style="margin-top: 10px;">
                <img width="50%" height="50%" src="https://res.cloudinary.com/dmuddhfdr/image/upload/v1777027993/image-removebg-preview_63_z1xbv2.png" alt="HandyHub Logo">
            </center>
        </section>
        <section class="header-text">
            <center>
                <h3>How would you like to continue?</h3>
            </center>
            <center>
                <p>Choose the option that best describes you</p>
            </center>
            <center>
                <p>to get started</p>
            </center>
        </section>
        <button id="continue-customer" class="continue-customer">
<div class="banner">
    <!-- Left: Circular Profile Section -->
    <div class="banner-left">
        <div class="circle-bg">
            <img src="../shared/assets/images/customer-img.png" alt="Customer" fetchpriority="high">
        </div>
    </div>
    <!-- Mid: Text Content -->
    <section class="banner-mid">
        <div class="title-row">
            <div class="user-icon">
                <img src="../shared/assets/icons/user-icon-white.png" alt="user icon">
            </div>
            <h3>I'm a Customer</h3>
        </div>
        <div class="ban-mid-sec-two">
            <p>Find and book trusted professionals for your home or office services.</p>
        </div>
    </section>

    <!-- Right: Arrow Action -->
    <section class="banner-right">
        <span class="arrow-btn">❯</span>
    </section>
</div>
        </button>
        <button id="continue-artisan" class="continue-artisan">
    <div class="banner-artisan">
        <section class="banner-left">
            <div class="circle-bg-artisan">
                <img src="../shared/assets/images/customer-img.png" alt="Artisan">
            </div>
        </section>

        <section class="banner-mid">
            <div class="title-row">
                <div class="user-icon-artisan">
                    <!-- Briefcase Icon -->
                    <img src="../shared/assets/icons/suite-case-white.png" alt="artisan icon">
                </div>
                <h3>I'm an Artisan</h3>
            </div>
            <div class="ban-mid-sec-two">
                <p>Offer your services, get bookings and grow your business with Handy Hub.</p>
            </div>
        </section>

        <section class="banner-right">
            <span style="font-size: 15px;" class="arrow-btn-artisan">❯</span>
        </section>
    </div>
</button>
<div class="security-banner">
    <div class="security-icon">
        <!-- Shield Check Icon -->
<img src="../shared/assets/icons/icons8-protection-96 red.png" alt="security-checked">    </div>
    <div class="security-text">
        <h4>Safe. Secure. Trusted by thousands of users</h4>
        <p>Your data is protected with industry standard security.</p>
    </div>
</div>
<script src="../shared/js/utils/logicGate.js"></script>
    <script src="../shared/js/utils/global-app.js"></script>
<script src="../shared/js/components/fastLoader.js"></script>
</body>
</html>
