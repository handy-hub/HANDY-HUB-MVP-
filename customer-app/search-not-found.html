<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Results | HandyHub</title>
    <link rel="stylesheet" href="css/tracking.css">
    <link rel="stylesheet" href="../shared/css/ui-polish.css">
</head>
<body>
    <div class="app search-view">
        <header class="search-header">
            <button class="back-btn" aria-label="Go back"
                    onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                     stroke="#333" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <div class="search-bar-wrapper">
                <input id="notfound-search-input" type="text"
                       placeholder="Try another search"
                       aria-label="Search services"
                       autocomplete="off" autocorrect="off" spellcheck="false">
                <button type="button" class="search-submit" aria-label="Search again">
                    <img class="click-to-search"
                         src="../shared/assets/icons/icons8-search-96.png"
                         alt="Search">
                </button>
            </div>
        </header>

        <main class="search-content">
            <section class="search-group">
                <h3>Not found</h3>
                <div class="results-message">
                    We couldn't find any services matching your search.
                </div>
                <div class="search-not-found-actions">
                    <p>Please try different keywords or choose a popular service.</p>
                    <button class="clear-btn" type="button"
                            onclick="window.location.href='search-page.html'">
                        Back to Search
                    </button>
                </div>
            </section>
        </main>
    </div>

<script type="module">
import { SearchHistoryService } from '../shared/js/services/searchHistoryService.js';
import { getAppContainer }       from '../shared/js/app/container.js';

const historyService = new SearchHistoryService();

// ── Read the ?q= param from the URL ──────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const failedQ = (params.get('q') || '').replace(/\s+/g, ' ').trim();

// Update the "not found" message with the actual query
const message = document.querySelector('.results-message');
if (message && failedQ) {
    message.textContent = `No results found for "${failedQ}". Try a different search.`;
}

// ── Save the failed query to history (it was a real user intent) ─────────────
// We save it here because the user may have navigated straight to this page
// via a direct link (not through trackingPage.js which already saved it).
// SearchHistoryService.add() is idempotent (deduplication) so double-saves
// from trackingPage.js are harmless.
if (failedQ) {
    try {
        const { services: { authService }, repositories: { customerRepository } } =
            getAppContainer();
        const user = await authService.waitForUser();
        if (user?.uid) {
            await historyService.init(user.uid, customerRepository);
        }
    } catch { /* non-fatal — service still works from localStorage */ }

    historyService.add(failedQ);
}

// ── Retry search form ─────────────────────────────────────────────────────────
const input  = document.querySelector('#notfound-search-input');
const button = document.querySelector('.search-submit');
const icon   = document.querySelector('.click-to-search');

function submitRetry() {
    const value = (input?.value || '').replace(/\s+/g, ' ').trim();
    if (!value) return;
    // Save to history before navigating
    historyService.add(value);
    window.location.href = `search-page.html?q=${encodeURIComponent(value)}`;
}

if (button) button.addEventListener('click', submitRetry);
if (icon)   icon.addEventListener('click', e => { e.preventDefault(); submitRetry(); });
if (input) {
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submitRetry(); }
    });
}
</script>

<script src="../shared/js/utils/global-app.js"></script>
<script src="../shared/js/components/fastLoader.js"></script>
</body>
</html>
