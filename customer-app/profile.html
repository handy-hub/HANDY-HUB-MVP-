<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="../shared/js/utils/themeManager.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handy Hub – Profile</title>
  <link rel="stylesheet" href="css/profile.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel='stylesheet' href='../shared/css/ui-polish.css' />
</head>
<body>

  <div class="app">
    <div class="scroll-area">

      <!-- Header -->
      <div class="page-header">
        <a href="dashboard.html" class="icon-btn" aria-label="Go to Dashboard"
           onclick="sessionStorage.setItem('pageTransitionDirection','back')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9 22 9 12 15 12 15 22" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <h1 class="page-title">Profile</h1>
        <button class="icon-btn" aria-label="Settings"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings.html'">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
            <path d="M11 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17.7 13.7a1.5 1.5 0 0 0 .3 1.65l.05.05a1.8 1.8 0 1 1-2.55 2.55l-.05-.05a1.5 1.5 0 0 0-1.65-.3 1.5 1.5 0 0 0-.91 1.37V19a1.8 1.8 0 0 1-3.6 0v-.07A1.5 1.5 0 0 0 8.3 17.7a1.5 1.5 0 0 0-1.65.3l-.05.05a1.8 1.8 0 1 1-2.55-2.55l.05-.05A1.5 1.5 0 0 0 4.4 13.8a1.5 1.5 0 0 0-1.37-.91H3a1.8 1.8 0 0 1 0-3.6h.07A1.5 1.5 0 0 0 4.3 8.3a1.5 1.5 0 0 0-.3-1.65l-.05-.05a1.8 1.8 0 1 1 2.55-2.55l.05.05A1.5 1.5 0 0 0 8.2 4.4a1.5 1.5 0 0 0 .91-1.37V3a1.8 1.8 0 0 1 3.6 0v.07a1.5 1.5 0 0 0 .91 1.37 1.5 1.5 0 0 0 1.65-.3l.05-.05a1.8 1.8 0 1 1 2.55 2.55l-.05.05A1.5 1.5 0 0 0 17.6 8.2a1.5 1.5 0 0 0 1.37.91H19a1.8 1.8 0 0 1 0 3.6h-.07a1.5 1.5 0 0 0-1.37.91Z"
                  stroke="#111" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- ═══ REDESIGNED USER CARD ═══ -->
      <div class="user-card">

        <!-- Top row: avatar + name + edit -->
        <div class="uc-top">
          <div class="avatar-wrap">
            <img id="profile-avatar"
                 src="" alt="Profile photo"
                 class="avatar skel skel-circle" />
            <button id="camera-btn" class="camera-btn" aria-label="Change photo">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2Z"
                      stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="13" r="4" stroke="#555" stroke-width="2"/>
              </svg>
            </button>
          </div>

          <div class="uc-name-block">
            <p id="profile-greeting" class="greeting skel" style="min-width:120px">&nbsp;</p>
            <p id="profile-name" class="user-name skel" style="min-width:100px">&nbsp;</p>
          </div>

        </div>

      

        <!-- Stats bar -->
        <div class="uc-divider"></div>
        <div class="uc-stats">
          <div class="uc-stat">
            <span class="uc-stat-value" id="stat-bookings">0</span>
            <span class="uc-stat-label">Bookings</span>
          </div>
          <div class="uc-stat-sep"></div>
          <div class="uc-stat">
            <span class="uc-stat-value" id="stat-spent">GHC 0</span>
            <span class="uc-stat-label">Total Spent</span>
          </div>
          <div class="uc-stat-sep"></div>
          <div class="uc-stat">
            <span class="uc-stat-value" id="stat-wallet">GHC 0</span>
            <span class="uc-stat-label">Wallet</span>
          </div>
        </div>

      </div><!-- /user-card -->

      <!-- Complete Profile Banner -->
      <div class="banner" id="complete-banner">
        <div class="banner-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" stroke="#730201" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="9 12 11 14 15 10" stroke="#730201" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="banner-text">
          <p class="banner-title">Complete your profile</p>
          <p class="banner-sub">Add a few details to get better recommendations.</p>
        </div>
        <button class="update-btn"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings-personal-info.html'">
          Update
        </button>
      </div>

      <!-- Wallet -->
      <h2 class="section-title">Wallet</h2>
      <div class="wallet-card">
        <div class="wallet-left">
          <p class="wallet-label">Wallet Balance</p>
          <p class="wallet-amount" id="wallet-balance-display">GHC —</p>
          <p id="wallet-escrow-note" style="display:none;font-size:11px;color:#f97316;font-weight:600;margin-top:2px;"></p>
          <button class="topup-btn" id="topup-trigger"
            onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='topup.html'">
            Top Up
          </button>
        </div>
        <div class="wallet-right">
          <a href="transaction-history.html" class="wallet-row">
            <div class="wallet-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="5" width="20" height="14" rx="2" stroke="#730201" stroke-width="1.7"/>
                <path d="M2 10h20" stroke="#730201" stroke-width="1.7"/>
                <path d="M6 15h4" stroke="#730201" stroke-width="1.7" stroke-linecap="round"/>
              </svg>
            </div>
            <span class="wallet-link">Transaction History</span>
            <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <div class="divider-line"></div>
          <!-- Payment Methods trigger — opens slide-up modal -->
          <button class="wallet-row" data-open-payments aria-label="Open payment methods">
            <div class="wallet-icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <rect x="1" y="4" width="22" height="16" rx="2" stroke="#730201" stroke-width="1.7"/>
                <path d="M1 10h22" stroke="#730201" stroke-width="1.7"/>
              </svg>
            </div>
            <span class="wallet-link">Payment Methods</span>
            <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- My Activity -->
      <h2 class="section-title">My Activity</h2>
      <div class="activity-card">
        <a href="booking.html" class="activity-item">
          <div class="activity-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="4" width="18" height="18" rx="2" stroke="#730201" stroke-width="1.7"/>
              <path d="M16 2v4M8 2v4M3 10h18" stroke="#730201" stroke-width="1.7" stroke-linecap="round"/>
              <path d="M8 14h1m3 0h1m-5 4h1m3 0h1" stroke="#730201" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <span>My Bookings</span>
        </a>
        <a href="messages.html" class="activity-item">
          <div class="activity-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"
                    stroke="#730201" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Messages</span>
        </a>
        <a href="transaction-history.html" class="activity-item">
          <div class="activity-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="5" width="20" height="14" rx="2" stroke="#730201" stroke-width="1.7"/>
              <path d="M2 10h20" stroke="#730201" stroke-width="1.7"/>
              <path d="M6 15h4" stroke="#730201" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <span>Payments</span>
        </a>
        <button class="activity-item">
          <div class="activity-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                       stroke="#730201" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span>Reviews</span>
        </button>
      </div>

      <!-- Menu List -->
      <div class="menu-list">
        <button class="menu-item"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings-location.html'">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0Z" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="10" r="3" stroke="#111" stroke-width="1.7"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Address Book</p>
            <p class="menu-sub">Manage your saved addresses</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="menu-item"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings-notifications.html'">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Notification Settings</p>
            <p class="menu-sub">Manage your alerts and preferences</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="menu-item"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings-help.html'">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3ZM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3Z"
                    stroke="#111" stroke-width="1.7"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Help &amp; Support</p>
            <p class="menu-sub">Get help, contact us or view FAQs</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="menu-item"
          onclick="if(navigator.share){navigator.share({title:'Handy Hub',text:'Try Handy Hub – the fastest way to book trusted artisans in Ghana!',url:window.location.origin})}else{alert('Share: Try Handy Hub for trusted artisans in Ghana!')}">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="9" cy="7" r="4" stroke="#111" stroke-width="1.7"/>
              <line x1="19" y1="8" x2="19" y2="14" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
              <line x1="22" y1="11" x2="16" y2="11" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Invite a Friend</p>
            <p class="menu-sub">Invite friends and earn rewards</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

        <button class="menu-item"
          onclick="sessionStorage.setItem('pageTransitionDirection','forward'); window.location.href='settings-about.html'">
          <div class="menu-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#111" stroke-width="1.7"/>
              <line x1="12" y1="8" x2="12" y2="12" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
              <line x1="12" y1="16" x2="12.01" y2="16" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">About Handy Hub</p>
            <p class="menu-sub">Learn more about us</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- Logout -->
      <button class="logout-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="#730201" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 17 21 12 16 7" stroke="#730201" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="#730201" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Log Out
      </button>

    </div><!-- /scroll-area -->


  </div><!-- /app -->

        <input type="file" id="profile-photo-input" accept="image/*" style="display:none" aria-hidden="true" />
  <script src="../shared/js/utils/global-app.js"></script>
  <script type="module">
    import { requireAuth } from '../shared/js/utils/authGuard.js';
    await requireAuth();
  </script>
  <script type="module" src="js/pages/profilePage.js"></script>
  <script src="../shared/js/components/fastLoader.js"></script>
</body>
</html>
