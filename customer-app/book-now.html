<script type="module">
// ═══════════════════════════════════════════════════════════════
//  book-now.html — Module script
//  Real Leaflet map · Real GPS · Real Firestore artisans
//  ASAP → book-emergency.html  |  Today/Schedule → book-step1.html
// ═══════════════════════════════════════════════════════════════

// ── Auth guard — redirect to login if no session ──────────────
import { requireAuth } from '../shared/js/utils/authGuard.js';
await requireAuth();

// ── Service catalogue ─────────────────────────────────────────
const SERVICES = {
  electrician: {

    price: 'GHC 50–80', arrival: '5–10 mins',

  },

    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2a5 5 0 0 1 5 5v3H7V7a5 5 0 0 1 5-5z" stroke="#730201" stroke-width="2"/><path d="M7 10c0 5.52 10 5.52 10 0M12 19v3M9 22h6" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>`,
  },
  carpenter: {
    name: 'Carpenter', category: 'Carpentry', emKey: 'Carpentry',
    desc: "We'll find an expert carpenter for your woodwork needs.",
    price: 'GHC 80–150', arrival: '10–20 mins',
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 4v16M3 8h12M3 16h8M3 4v16" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>`,
  },
  ac: {
    name: 'AC Specialist', category: 'AC Repair', emKey: 'AC Repair',
    desc: 'Get your AC serviced by a certified technician fast.',
    price: 'GHC 100–200', arrival: '15–25 mins',
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93 4.93 19.07" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>`,
  },
  cleaning: {
    name: 'Cleaner', category: 'Cleaning', emKey: 'Cleaning',
    desc: 'Book a trusted home cleaning professional today.',
    price: 'GHC 80–150', arrival: '10–20 mins',
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="#730201" stroke-width="2"/><path d="M9 22V12h6v10" stroke="#730201" stroke-width="2" stroke-linecap="round"/></svg>`,
  },
  more: {
    name: 'Other Service', category: '', emKey: 'General Emergency',
    desc: "Tell us what you need and we'll find the right person.",
    price: 'GHC 50–200', arrival: '5–20 mins',
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.5" fill="#730201"/><circle cx="12" cy="12" r="1.5" fill="#730201"/><circle cx="19" cy="12" r="1.5" fill="#730201"/></svg>`,
  },
};

const SVC_KEY_MAP = {
  'Electrical': 'electrician', 'Plumbing': 'plumber', 'Carpentry': 'carpenter',
  'AC Repair': 'ac', 'Cleaning': 'cleaning', 'General Emergency': 'more',
};

// ── Module state ─────────────────────────────────────────────────
let currentSvc     = 'electrician';
let currentUrgency = 'asap';
let mapInstance    = null;
let userMarker     = null;
let artisanMarkers = [];
let userLat        = null;
let userLng        = null;
let loadedArtisans = [];

// ── DOM refs ─────────────────────────────────────────────────────
const locAddrEl    = document.getElementById('loc-addr-text');
const hdrSubEl     = document.getElementById('hdr-location-sub');
const nearbyBadge  = document.getElementById('nearby-badge');
const nearbyTxt    = document.getElementById('nearby-count-txt');
const prosCountBdg = document.getElementById('pros-count-badge');
const prosList     = document.getElementById('pros-list');
const stickyPrice  = document.getElementById('sticky-price');
const stickyArriv  = document.getElementById('sticky-arrival');

// ═══════════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════════
const ACCRA_LAT = 5.6037, ACCRA_LNG = -0.1870; // fallback centre

function initMap(lat, lng) {
  if (mapInstance) { mapInstance.setView([lat, lng], 15); return; }
  mapInstance = L.map('bn2-map', {
    center: [lat, lng], zoom: 15,
    zoomControl: false,
    attributionControl: false,
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(mapInstance);
  L.control.attribution({ prefix: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a>' })
    .addTo(mapInstance);
}

function placeUserMarker(lat, lng) {
  if (userMarker) { userMarker.setLatLng([lat, lng]); return; }
  const icon = L.divIcon({
    className: '',
    html: `<div class="bn2-you-marker"><div class="bn2-you-pulse"></div><div class="bn2-you-dot"></div></div>`,
    iconSize: [30, 30], iconAnchor: [15, 15],
  });
  userMarker = L.marker([lat, lng], { icon }).addTo(mapInstance);
}

function placeArtisanMarkers(artisans) {
  artisanMarkers.forEach(function(m) { m.remove(); });
  artisanMarkers = [];
  artisans.forEach(function(artisan) {
    const d = artisan.data || {};
    // Only place markers if the artisan document has real lat/lng
    if (typeof d.latitude !== 'number' || typeof d.longitude !== 'number') return;
    const initial = (d.name || '?').charAt(0).toUpperCase();
    const icon = L.divIcon({
      className: '',
      html: `<div class="bn2-pro-marker"><span>${initial}</span><div class="bn2-pro-eta-bubble">—</div></div>`,
      iconSize: [44, 54], iconAnchor: [22, 54],
    });
    const m = L.marker([d.latitude, d.longitude], { icon }).addTo(mapInstance);
    artisanMarkers.push(m);
  });
}

// ═══════════════════════════════════════════════════════════════
//  GEOLOCATION
// ═══════════════════════════════════════════════════════════════
window.detectLocation = function detectLocation() {
  locAddrEl.textContent = 'Detecting…';
  hdrSubEl.textContent  = 'Detecting location…';
  if (!navigator.geolocation) { useFallbackLocation(); return; }
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      userLat = lat; userLng = lng;
      initMap(lat, lng);
      placeUserMarker(lat, lng);
      reverseGeocode(lat, lng);
      loadArtisans();
    },
    function() { useFallbackLocation(); },
    { timeout: 8000, maximumAge: 60000 }
  );
};

function useFallbackLocation() {
  userLat = ACCRA_LAT; userLng = ACCRA_LNG;
  locAddrEl.textContent = 'Accra, Ghana (approximate)';
  hdrSubEl.textContent  = 'Accra';
  initMap(ACCRA_LAT, ACCRA_LNG);
  placeUserMarker(ACCRA_LAT, ACCRA_LNG);
  loadArtisans();
}

function reverseGeocode(lat, lng) {
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, {
    headers: { 'Accept-Language': 'en' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    const a = data.address || {};
    const parts = [
      a.road || a.pedestrian || a.footway,
      a.suburb || a.neighbourhood || a.quarter,
      a.city   || a.town          || a.village || a.county,
    ].filter(Boolean);
    locAddrEl.textContent = parts.slice(0, 2).join(', ') || 'Your area';
    hdrSubEl.textContent  = a.suburb || a.city || a.town || 'Nearby';
  })
  .catch(function() {
    locAddrEl.textContent = 'Location detected';
    hdrSubEl.textContent  = 'Nearby';
  });
}

window.locateMe = function locateMe() {
  if (mapInstance && userLat !== null) {
    mapInstance.flyTo([userLat, userLng], 16, { duration: 1 });
  } else {
    detectLocation();
  }
};

// ═══════════════════════════════════════════════════════════════
//  ARTISAN LOADING
// ═══════════════════════════════════════════════════════════════

function buildProCard(artisan) {
  const d  = artisan.data || {};
  const id = artisan.id;
  const name      = d.name          || 'Professional';
  const specialty = d.specialty     || d.category || '';
  const rating    = d.rating        ? parseFloat(d.rating).toFixed(1) : null;
  const reviews   = d.reviewCount   || 0;
  const jobs      = d.jobsCompleted || 0;
  const avail     = d.isAvailable   !== false;
  const photo     = d.profileImage  || null;
  const location  = d.location      || '';

  const photoHtml = photo
    ? `<img class="bn2-pro-img" src="${photo}" alt="${name}" loading="lazy">`
    : `<div class="bn2-pro-img bn2-pro-img-init">${name.charAt(0).toUpperCase()}</div>`;

  const ratingHtml = rating
    ? `<span class="bn2-pro-rating">★ ${rating}</span><span class="bn2-pro-reviews">(${reviews})</span>`
    : `<span class="bn2-pro-reviews">No reviews yet</span>`;

  const availHtml = avail
    ? `<span class="bn2-pro-avail-dot"></span><span class="bn2-pro-avail-lbl">Available</span>`
    : `<span class="bn2-pro-unavail-dot"></span><span class="bn2-pro-avail-lbl bn2-pro-avail-lbl--off">Busy</span>`;

  // Escape id for safe use in onclick attribute
  const safeId = id.replace(/'/g, "\\'");

  return `
    <div class="bn2-pro-card${!avail ? ' bn2-pro-card--dim' : ''}" onclick="window._bnSelectPro('${safeId}')">
      <div class="bn2-pro-photo-wrap">
        ${photoHtml}
        <div class="bn2-pro-avail-badge">${availHtml}</div>
      </div>
      <div class="bn2-pro-body">
        <p class="bn2-pro-name">${name}</p>
        <p class="bn2-pro-spec">${specialty}${location ? ' · ' + location : ''}</p>
        <div class="bn2-pro-meta-row">
          ${ratingHtml}
          <span class="bn2-pro-dot-sep">·</span>
          <span class="bn2-pro-jobs">${jobs} jobs</span>
        </div>
      </div>
      <div class="bn2-pro-action">
        <div class="bn2-pro-select-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>`;
}

// Expose selectPro to inline onclick (module scope isolation workaround)
window._bnSelectPro = function(id) {
  const artisan = loadedArtisans.find(function(a) { return a.id === id; });
  if (!artisan) return;
  const d = artisan.data || {};

  // Highlight selected card
  document.querySelectorAll('.bn2-pro-card').forEach(function(c) {
    c.classList.remove('bn2-pro-card--selected');
  });
  // Find card by artisan id stored in onclick
  document.querySelectorAll('.bn2-pro-card').forEach(function(c) {
    if (c.getAttribute('onclick') && c.getAttribute('onclick').includes(id.replace(/'/g, "\\'"))) {
      c.classList.add('bn2-pro-card--selected');
    }
  });

  // Persist to booking state for downstream steps
  try {
    const BK_KEY = 'hh_booking'; // unified key shared with book-step1 → step4
    const state  = JSON.parse(localStorage.getItem(BK_KEY) || '{}');
    state.professional = {
      id, uid: id,
      name:         d.name         || '',
      specialty:    d.specialty    || '',
      rating:       d.rating       || null,
      reviewCount:  d.reviewCount  || 0,
      profileImage: d.profileImage || null,
      phone:        d.phone        || '',
    };
    state.services = [{
      name:     SERVICES[currentSvc].name,
      category: SERVICES[currentSvc].category,
    }];
    localStorage.setItem(BK_KEY, JSON.stringify(state));
  } catch (_) {}
};

window.loadArtisans = async function loadArtisans() {
  showSkeletons();
  nearbyBadge.style.display  = 'none';
  prosCountBdg.style.display = 'none';

  const svc      = SERVICES[currentSvc];
  const category = svc.category;

  try {
    const { getAppContainer } = await import('../shared/js/app/container.js');
    const { repositories: { artisanRepository } } = getAppContainer();

    let results = [];
    if (category) {
      results = await artisanRepository.findByCategory(category, 10);
      if (!results || !results.length) {
        results = await artisanRepository.getTopRated(8);
      }
    } else {
      results = await artisanRepository.getTopRated(10);
    }

    loadedArtisans = Array.isArray(results) ? results : [];

    if (!loadedArtisans.length) {
      showEmptyState(svc.name);
      return;
    }

    prosList.innerHTML = loadedArtisans.map(buildProCard).join('');

    const count = loadedArtisans.length;
    nearbyTxt.textContent    = count + ' professional' + (count !== 1 ? 's' : '') + ' nearby';
    nearbyBadge.style.display  = 'flex';
    prosCountBdg.textContent   = count;
    prosCountBdg.style.display = 'inline-flex';

    // Place real markers only where artisans have stored lat/lng
    if (mapInstance) placeArtisanMarkers(loadedArtisans);

  } catch (err) {
    console.error('[book-now] loadArtisans error:', err);
    showErrorState();
  }
};

// ═══════════════════════════════════════════════════════════════
//  SERVICE / URGENCY SELECTION
// ═══════════════════════════════════════════════════════════════
window.selectService = function selectService(svcId, btn) {
  document.querySelectorAll('.bn2-svc-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  currentSvc = svcId;
  _updateDetail();
  window.loadArtisans();
};

function _updateDetail() {
  const svc = SERVICES[currentSvc];
  document.getElementById('svc-detail-icon').innerHTML    = svc.icon;
  document.getElementById('svc-detail-name').textContent  = svc.name;
  document.getElementById('svc-detail-desc').textContent  = svc.desc;
  document.getElementById('svc-detail-price').textContent = svc.price;
  document.getElementById('svc-detail-arrival').textContent = svc.arrival;
  stickyPrice.textContent = svc.price;
  stickyArriv.textContent = 'Arrives in ~' + svc.arrival;
}

window.selectUrgency = function selectUrgency(urgId, btn) {
  document.querySelectorAll('.bn2-urgency-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentUrgency = urgId;
  const ctaEl = document.getElementById('sticky-cta-text');
  if      (urgId === 'asap')     ctaEl.textContent = 'Get Help Now';
  else if (urgId === 'today')    ctaEl.textContent = 'Book Today';
  else                           ctaEl.textContent = 'Schedule Booking';
};

// ═══════════════════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════════════════
window.continueFlow = function continueFlow() {
  const svc = SERVICES[currentSvc];
  sessionStorage.setItem('hh_service', svc.emKey);
  sessionStorage.setItem('hh_task',    svc.name);
  sessionStorage.setItem('em_service', svc.emKey);

  if (currentUrgency === 'asap') {
    window.location.href = 'book-emergency.html';
  } else {
    // Standard booking — step 1 picks category via sessionStorage
    window.location.href = 'book-step1.html';
  }
};

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Honour incoming service selection from dashboard
  const incoming = sessionStorage.getItem('hh_service');
  if (incoming && SVC_KEY_MAP[incoming]) {
    const id  = SVC_KEY_MAP[incoming];
    currentSvc = id;
    document.querySelectorAll('.bn2-svc-chip').forEach(function(c) { c.classList.remove('active'); });
    const btn = document.getElementById('chip-' + id);
    if (btn) btn.classList.add('active');
  }
  _updateDetail();
  detectLocation(); // triggers map init + artisan load
});
</script>
