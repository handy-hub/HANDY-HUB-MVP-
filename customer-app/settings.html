  <!-- ── DELETE ACCOUNT MODAL ──────────────────── -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-card">
      <div class="modal-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <polyline points="3 6 5 6 21 6" stroke="#730201" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="#730201" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="#730201" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" stroke="#730201" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="modal-title">Delete Account?</p>
      <p class="modal-body">This action is permanent. All your data including bookings, messages and wallet balance will be deleted and cannot be recovered.</p>
      <input id="delete-password" class="modal-input" type="password" placeholder="Enter your password to confirm" />
      <div class="modal-actions">
        <button class="modal-btn-danger" id="delete-confirm-btn" onclick="confirmDeleteAccount()">Yes, Delete My Account</button>
        <button class="modal-btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    // ── Entry animation ──────────────────────────────────
    (function () {
      var key = 'pageTransitionDirection';
      try {
        var dir = sessionStorage.getItem(key);
        sessionStorage.removeItem(key);
        if (dir === 'forward') document.body.classList.add('page-slide-in-right');
        else if (dir === 'back') document.body.classList.add('page-slide-in-left');
        document.body.addEventListener('animationend', function () {
          document.body.classList.remove('page-slide-in-right', 'page-slide-in-left');
        }, { once: true });
      } catch (e) {}
    })();

    // ── Navigation helper ────────────────────────────────
    function goTo(page) {
      sessionStorage.setItem('pageTransitionDirection', 'forward');
      window.location.href = page;
    }

    // ── Preferences stored in localStorage ──────────────
    var PREFS = {
      language: localStorage.getItem('pref_language') || 'English',
      theme:    localStorage.getItem('pref_theme')    || 'Light',
      currency: localStorage.getItem('pref_currency') || 'GHC',
      address:  localStorage.getItem('pref_address')  || ''
    };

    function applyPrefsToUI() {
      document.getElementById('lang-display').textContent     = PREFS.language;
      document.getElementById('theme-display').textContent    = PREFS.theme;
      document.getElementById('currency-display').textContent = PREFS.currency;
      var aDisp = document.getElementById('address-display');
      aDisp.textContent = PREFS.address || 'Set your default address';
      document.getElementById('address-input').value = PREFS.address;

      // Mark selected options in sheets
      ['language-sheet','theme-sheet','currency-sheet'].forEach(function(id) {
        var key = id.replace('-sheet','');
        document.querySelectorAll('#'+id+' .sheet-option').forEach(function(btn) {
          var val = btn.dataset.value;
          var match = (key === 'language' && val === PREFS.language) ||
                      (key === 'theme'    && val === PREFS.theme)    ||
                      (key === 'currency' && val === PREFS.currency);
          btn.classList.toggle('selected', match);
        });
      });
    }

    applyPrefsToUI();

    // Sync currency display in case themeManager.js auto-detected it
    PREFS.currency = localStorage.getItem('pref_currency') || PREFS.currency;
    document.getElementById('currency-display').textContent = PREFS.currency;

    // ── Bottom sheet helpers ─────────────────────────────
    function openSheet(id) {
      closeAll();
      document.getElementById(id).classList.add('open');
      document.getElementById('backdrop').classList.add('visible');
    }

    function closeAll() {
      document.querySelectorAll('.bottom-sheet').forEach(function(s) { s.classList.remove('open'); });
      document.getElementById('backdrop').classList.remove('visible');
      document.getElementById('delete-modal').classList.remove('visible');
    }

    function selectPref(key, value, btn) {
      PREFS[key] = value;
      localStorage.setItem('pref_' + key, value);
      if (key === 'theme') {
        if (typeof applyTheme === 'function') applyTheme(value);
      }
      // Sync to Firestore in realtime (settingsPage.js wires this up)
      if (typeof window.__saveAppPref === 'function') {
        window.__saveAppPref(key, value);
      }
      applyPrefsToUI();
      setTimeout(closeAll, 180);
    }

    function saveAddress() {
      var val = document.getElementById('address-input').value.trim();
      PREFS.address = val;
      localStorage.setItem('pref_address', val);
      // Persist address to Firestore via settingsPage.js helper
      if (typeof window.__saveAppPref === 'function') {
        window.__saveAppPref('address', val);
      }
      applyPrefsToUI();
      closeAll();
    }

    // ── Delete account modal ─────────────────────────────
    function openDeleteModal() {
      document.getElementById('delete-password').value = '';
      document.getElementById('delete-modal').classList.add('visible');
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').classList.remove('visible');
    }

    // Drag-to-close for all bottom sheets and delete modal
    (function() {
      var backdrop = document.getElementById('backdrop');

      // Bottom preference sheets
      document.querySelectorAll('.bottom-sheet').forEach(function(sheet) {
        var startY = 0, curY = 0, active = false;
        sheet.addEventListener('touchstart', function(e) {
          startY = e.touches[0].clientY; curY = 0; active = true;
          sheet.style.transition = 'none';
        }, { passive: true });
        sheet.addEventListener('touchmove', function(e) {
          if (!active) return;
          var dy = e.touches[0].clientY - startY;
          if (dy < 0) return;
          curY = dy;
          sheet.style.transform = 'translateX(-50%) translateY(' + dy + 'px)';
          var p = Math.min(dy / (sheet.offsetHeight * 0.5), 1);
          backdrop.style.opacity = String(1 - p * 0.9);
        }, { passive: true });
        sheet.addEventListener('touchend', function() {
          if (!active) return; active = false;
          if (curY > sheet.offsetHeight * 0.35) {
            sheet.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
            sheet.style.transform = 'translateX(-50%) translateY(110%)';
            backdrop.style.transition = 'opacity 0.3s';
            backdrop.style.opacity = '0';
            setTimeout(function() {
              closeAll();
              sheet.style.removeProperty('transform');
              sheet.style.removeProperty('transition');
              backdrop.style.removeProperty('opacity');
              backdrop.style.removeProperty('transition');
            }, 300);
          } else {
            sheet.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
            sheet.style.transform = 'translateX(-50%) translateY(0)';
            backdrop.style.removeProperty('opacity');
            setTimeout(function() {
              sheet.style.removeProperty('transform');
              sheet.style.removeProperty('transition');
            }, 400);
          }
        });
      });

      // Delete account modal
      var deleteCard = document.querySelector('#delete-modal .modal-card');
      var deleteOverlay = document.getElementById('delete-modal');
      if (deleteCard) {
        var startY2 = 0, curY2 = 0, active2 = false;
        deleteCard.addEventListener('touchstart', function(e) {
          startY2 = e.touches[0].clientY; curY2 = 0; active2 = true;
          deleteCard.style.transition = 'none';
        }, { passive: true });
        deleteCard.addEventListener('touchmove', function(e) {
          if (!active2) return;
          var dy = e.touches[0].clientY - startY2;
          if (dy < 0) return;
          curY2 = dy;
          deleteCard.style.transform = 'translateY(' + dy + 'px)';
          var p = Math.min(dy / (deleteCard.offsetHeight * 0.5), 1);
          deleteOverlay.style.opacity = String(1 - p * 0.9);
        }, { passive: true });
        deleteCard.addEventListener('touchend', function() {
          if (!active2) return; active2 = false;
          if (curY2 > deleteCard.offsetHeight * 0.35) {
            deleteCard.style.transition = 'transform 0.3s cubic-bezier(0.32,0.72,0,1)';
            deleteCard.style.transform = 'translateY(110%)';
            deleteOverlay.style.transition = 'opacity 0.3s';
            deleteOverlay.style.opacity = '0';
            setTimeout(function() {
              closeDeleteModal();
              deleteCard.style.removeProperty('transform');
              deleteCard.style.removeProperty('transition');
              deleteOverlay.style.removeProperty('opacity');
              deleteOverlay.style.removeProperty('transition');
            }, 300);
          } else {
            deleteCard.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
            deleteCard.style.transform = 'translateY(0)';
            deleteOverlay.style.removeProperty('opacity');
            setTimeout(function() {
              deleteCard.style.removeProperty('transform');
              deleteCard.style.removeProperty('transition');
            }, 400);
          }
        });
      }
    })();
  </script>

  <script type="module" src="js/pages/settingsPage.js"></script>
<script src="../shared/js/components/fastLoader.js"></script>
</body>
</html>
