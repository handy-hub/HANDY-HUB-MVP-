<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Handy Hub – Settings</title>
  <link rel="stylesheet" href="css/settings.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="phone-shell">
    <div class="scroll-area">

      <!-- Page Header -->
      <div class="page-header">
        <button class="back-btn" aria-label="Go back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="page-title">Settings</h1>
        <div class="header-spacer"></div>
      </div>

      <!-- Account Section -->
      <p class="section-label">Account</p>
      <div class="menu-card">

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="7" r="4" stroke="#e03030" stroke-width="1.7"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Personal Information</p>
            <p class="menu-sub">Update your name, email and phone number</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="11" r="2" stroke="#e03030" stroke-width="1.5"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Security</p>
            <p class="menu-sub">Change password and manage security</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="#e03030" stroke-width="1.7"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#e03030" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Privacy</p>
            <p class="menu-sub">Manage your privacy preferences</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Notification Preferences</p>
            <p class="menu-sub">Choose what updates you want to receive</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0Z" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="10" r="3" stroke="#e03030" stroke-width="1.7"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Location Settings</p>
            <p class="menu-sub">Manage your saved locations and permissions</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

      </div>

      <!-- App Preferences Section -->
      <p class="section-label">App Preferences</p>
      <div class="menu-card">

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#111" stroke-width="1.7"/>
              <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10Z" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Language</p>
            <p class="menu-sub">Change app language</p>
          </div>
          <div class="menu-value-wrap">
            <span class="menu-value">English</span>
            <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="5" stroke="#111" stroke-width="1.7"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Theme</p>
            <p class="menu-sub">Choose your preferred theme</p>
          </div>
          <div class="menu-value-wrap">
            <span class="menu-value">Light</span>
            <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#111" stroke-width="1.7"/>
              <path d="M12 6v6l4 2" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Currency</p>
            <p class="menu-sub">Select your preferred currency</p>
          </div>
          <div class="menu-value-wrap">
            <span class="menu-value">GHC (GH₵)</span>
            <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="9 22 9 12 15 12 15 22" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Default Service Address</p>
            <p class="menu-sub">Set your default address for bookings</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

      </div>

      <!-- Support & About Section -->
      <p class="section-label">Support & About</p>
      <div class="menu-card">

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M3 18v-6a9 9 0 0 1 18 0v6" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3ZM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3Z" stroke="#111" stroke-width="1.7"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Help & Support</p>
            <p class="menu-sub">Get help, contact us or view FAQs</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Terms & Conditions</p>
            <p class="menu-sub">Read our terms and conditions</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" stroke="#111" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Privacy Policy</p>
            <p class="menu-sub">Learn how we protect your data</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="item-divider"></div>

        <button class="menu-item">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="#111" stroke-width="1.7"/>
              <line x1="12" y1="8" x2="12" y2="12" stroke="#111" stroke-width="1.7" stroke-linecap="round"/>
              <line x1="12" y1="16" x2="12.01" y2="16" stroke="#111" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">About Handy Hub</p>
            <p class="menu-sub">App version 1.0.0</p>
          </div>
          <svg width="7" height="12" viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="#bbb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>

      </div>

      <!-- Delete Account -->
      <button class="delete-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <polyline points="3 6 5 6 21 6" stroke="#e03030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="#e03030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 11v6M14 11v6" stroke="#e03030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" stroke="#e03030" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Delete Account
      </button>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="9 22 9 12 15 12 15 22" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="8" y="2" width="8" height="4" rx="1" stroke="#aaa" stroke-width="1.7"/>
          <path d="M9 12h6M9 16h4" stroke="#aaa" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span>Bookings</span>
      </button>
      <button class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Messages</span>
      </button>
      <button class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Saved</span>
      </button>
      <button class="nav-item active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#e03030" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="7" r="4" stroke="#e03030" stroke-width="1.7"/>
        </svg>
        <span class="active-label">Profile</span>
      </button>
    </nav>

  </div>

  <script src="settings.js"></script>
</body>
</html>
