<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Services</title>
    <link rel="stylesheet" href="css/tracking.css">
</head>
<body>
    <div class="app search-view">
        <!-- Top Fixed Header -->
        <header class="search-header">
            <button class="back-btn" onclick="window.history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="search-bar-wrapper">
                <input id="tracking-search-input" type="text" placeholder="What service do you need?" autofocus aria-label="Search services">
                <button type="button" class="search-submit" aria-label="Submit search">
                    <img class="click-to-search" src="../shared/assets/icons/icons8-search-96.png" alt="Search icon">
                </button>
            </div>
        </header>

        <!-- Scrollable Content -->
        <main class="search-content">
            <section class="search-results-group search-group" hidden>
                <h3>Search results</h3>
                <div class="results-message" aria-live="polite"></div>
                <ul class="results-list" aria-live="polite" role="list"></ul>
            </section>
            <!-- Popular Searches -->
            <section class="search-group">
                <h3>Popular Searches</h3>
                <div class="tag-cloud">
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> Fix leaking pipe</p></button>
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> Install fan</p></button>
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> Emergency electrician</p></button>
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> Clean air conditioner</p></button>
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> Paint my room</p></button>
                    <button type="button" class="search-tag"><img src="../shared/assets/icons/settings-icon.png"><p> See more -></p></button>
                </div>
            </section>

            <!-- Categories -->
            <section class="search-group">
                <h3>Search by Category</h3>
                <div class="cat-grid">
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/electricals.png"></span><span>Electrical</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/plummer.png"></span><span>Plumbing</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/carpenter.png"></span><span>Carpentry</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/cooling.png"></span><span>Cooling</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/welder.png"></span><span>Welding</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img src="../shared/assets/icons/painter.png"></span><span>Painting</span></button>
                    <button type="button" class="cat-box"><span class="circle"><img height="10px" src="../shared/assets/icons/more.png"></span><span>More</span></button>
                </div>
            </section>

            <!-- AI Banner -->
            <div class="ai-box">
                <div class="ai-logo">AI</div>
                <div class="ai-info">
                    <p class="title">Not sure what you need?</p>
                    <p class="sub">Describe the issue and we'll help you find the right professional.</p>
                </div>
                <button class="ai-action">Try AI Search -></button>
            </div>

            <!-- Recent History -->
            <section class="recent-group">
                <div class="recent-head">
                    <h3>Recent Searches</h3>
                    <button class="clear-btn">Clear all</button>
                </div>
                <ul class="history-list" aria-live="polite" role="list"></ul>
            </section>

            <!-- Footer Action -->
            <div class="chat-footer">
                <p>Can't find what you're looking for?</p>
                <span>Chat with us and we'll help you.</span>
                <button class="chat-btn"><img src="../shared/assets/icons/chat.png"> Chat with Support</button>
            </div>
        </main>
    </div>
    <script src="Scripts/script.js"></script>
</body>
</html>
