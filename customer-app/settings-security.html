<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handy Hub – Security</title>
  <link rel="stylesheet" href="css/settings.css" />
  <link rel="stylesheet" href="../shared/css/pageTransitions.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="../shared/js/utils/themeManager.js"></script>

  <link rel='stylesheet' href='../shared/css/ui-polish.css' />
</head>
<body>
  <div class="phone-shell">
    <div class="scroll-area">

      <div class="page-header">
        <button class="back-btn" aria-label="Go back"
          onclick="sessionStorage.setItem('pageTransitionDirection','back'); window.location.href='settings.html'">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <h1 class="page-title">Security</h1>
        <div class="header-spacer"></div>
      </div>

      <p class="section-label">Change Password</p>
      <div class="form-section">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <input id="current-pw" class="form-input" type="password" placeholder="Enter current password" />
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input id="new-pw" class="form-input" type="password" placeholder="Min. 8 characters" />
          <p class="input-hint">Use a mix of letters, numbers, and symbols.</p>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input id="confirm-pw" class="form-input" type="password" placeholder="Re-enter new password" />
        </div>
      </div>

      <button class="save-btn" id="save-btn" onclick="changePassword()">Update Password</button>

      <p class="section-label" style="margin-top:24px;">Account Info</p>
      <div class="menu-card">
        <div class="menu-item" style="cursor:default;">
          <div class="menu-icon-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 4h16v16H4z" stroke="none"/>
              <path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Z" stroke="#730201" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 7l-10 7L2 7" stroke="#730201" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="menu-text">
            <p class="menu-title">Email Address</p>
            <p class="menu-sub" id="account-email">Loading…</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function () {
      try {
        var dir = sessionStorage.getItem('pageTransitionDirection');
        sessionStorage.removeItem('pageTransitionDirection');
        if (dir === 'forward') document.body.classList.add('page-slide-in-right');
        else if (dir === 'back') document.body.classList.add('page-slide-in-left');
        document.body.addEventListener('animationend', function () {
          document.body.classList.remove('page-slide-in-right', 'page-slide-in-left');
        }, { once: true });
      } catch (e) {}
    })();

    document.querySelectorAll('.form-input').forEach(function(el) {
      el.addEventListener('focus',  function() { el.closest('.form-group').classList.add('focused'); });
      el.addEventListener('blur',   function() { el.closest('.form-group').classList.remove('focused'); });
    });
  </script>

  <script type="module" src="js/pages/settingsSecurity.js"></script>
<script src="../shared/js/components/fastLoader.js"></script>
</body>
</html>
