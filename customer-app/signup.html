    <main class="signup-container">
        <form id="signup-form">

                <input type="text" id="full-name" placeholder="Enter your full name" autocomplete="name">
            </div>

            <div class="input-signup">
                <label>Email</label>
                <img src="../shared/assets/icons/icons8-email-24.png" class="in-input">
                <input type="email" id="email" placeholder="Enter email" autocomplete="email">
            </div>
               <div class="input-signup">
                <label>Phone Number</label>
                <img src="../shared/assets/icons/icons8-phone-32.png" class="in-input">
                <input id="tel-no" type="tel" placeholder="Phone number" autocomplete="tel">
            </div>
            <div class="input-signup">
                <label>Location</label>
                <img src="../shared/assets/icons/icons8-location-pin-24.png" class="in-input">
                <input id="location" type="text" placeholder="Auto detection location" autocomplete="address-level2">
            </div>
            <div class="input-signup">
                <label>Password</label>
                <img src="../shared/assets/icons/icons8-lock-24.png" class="in-input">
                <input type="password" id="pass" placeholder="Create a password" autocomplete="new-password">
                <img src="../shared/assets/icons/icons8-eye-96.png" class="eye-icon">
                <div class="pass-hint">
                    <img src="../shared/assets/icons/icons8-protect-96.png" width="12">
                    <span>Password must be at least 8 characters</span>
                </div>
            </div>

            <div class="input-signup">
                <label>Confirm Password</label>
                <img src="../shared/assets/icons/icons8-lock-24.png" class="in-input">
                <input type="password" id="confirm" placeholder="Confirm your password" autocomplete="new-password">
                <img src="../shared/assets/icons/icons8-eye-96.png" class="eye-icon">
            </div>

            <div class="terms-row">
                <input type="checkbox">
                <label>I agree to the <span><a  href="#">Terms of Service</a> </span> and <span><a  href="#">Privicy Policy</a></span></label>
            </div>

<button type="submit" id="submit-btn" class="login-btn" disabled>Sign Up <img width="20" height="20" src="../shared/assets/icons/icons8-right-24.png" alt="arrow" style="display: inline-block; margin-left: 8px; vertical-align: middle;"></button>
        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

            <section class="social-login">
                <button id="google-signup-btn" type="button" class="social-btn"><img width="20" height="20" src="https://img.icons8.com/color/48/google-logo.png" alt="google-logo"/>Google</button>
                <button id="apple-signup-btn" type="button" class="social-btn"><img width="20" height="20" src="https://img.icons8.com/ios-filled/50/mac-os.png" alt="mac-os"/>Apple</button>
                <button id="facebook-signup-btn" type="button" class="social-btn"><img width="48" height="48" src="https://img.icons8.com/color/48/facebook-new.png" alt="facebook-new"/>Facebook</button>
            </section>
