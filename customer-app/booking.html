<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="../shared/js/utils/themeManager.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HandyHub | Bookings</title>
    <link rel="stylesheet" href="css/booking.css">
    <script src="../shared/js/utils/themeManager.js"></script>
</head>
<body>
    <div class="app">
        <header class="profile-card">
            <h2 class="name">MY BOOKINGS</h2>
            <p class="location">Track your active and past jobs</p>
        </header>

        <main style="margin-top: 16px;">
            <section class="pro-card" style="margin-bottom: 12px;">
                <div class="pro-left">
                    <div class="img-container">
                        <img src="https://res.cloudinary.com/dmuddhfdr/image/upload/v1772302011/vjx_records/vuynbwasdmpmzgiii6ln.jpg" alt="Kwame Mensah">
                        <span class="status-dot"></span>
                    </div>
                    <div class="pro-details">
                        <h3>Kwame Mensah</h3>
                        <p class="pro-type">Plumber</p>
                        <p class="distance">Upcoming: May 10, 10:00 AM</p>
                    </div>
                </div>
                <div class="pro-right">
                    <p class="starts">Status</p>
                    <p class="price" style="font-size: 14px;">Confirmed</p>
                </div>
            </section>

            <section class="pro-card">
                <div class="pro-left">
                    <div class="img-container">
                        <img src="https://res.cloudinary.com/dmuddhfdr/image/upload/v1772301950/vjx_records/k8oruwmjbtq8bv4mupu4.png" alt="Emmanuel Asare">
                    </div>
                    <div class="pro-details">
                        <h3>Emmanuel Asare</h3>
                        <p class="pro-type">Electrician</p>
                        <p class="distance">Completed: May 2, 3:30 PM</p>
                    </div>
                </div>
                <div class="pro-right">
                    <p class="starts">Status</p>
                    <p class="price" style="font-size: 14px;">Done</p>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="9 22 9 12 15 12 15 22" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Home</span>
            </a>
            <a href="booking.html" class="nav-item active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" stroke="#730201" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" stroke="#730201" stroke-width="1.7"/>
                    <path d="M9 12h6M9 16h4" stroke="#730201" stroke-width="1.7" stroke-linecap="round"/>
                </svg>
                <span class="active-label">Bookings</span>
            </a>
            <a href="messages.html" class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Messages</span>
            </a>
            <a href="saved.html" class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Saved</span>
            </a>
            <a href="profile.html" class="nav-item">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#aaa" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="7" r="4" stroke="#aaa" stroke-width="1.7"/>
                </svg>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="../shared/js/utils/global-app.js"></script>
</body>
</html>
