<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandyHub – Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand:        #730201;
      --brand-dark:   #5a0101;
      --brand-light:  #FFF5F5;
      --text-dark:    #111827;
      --text-mid:     #4B5563;
      --text-light:   #9CA3AF;
      --surface:      #FFFFFF;
      --surface-2:    #F9FAFB;
      --border:       #E5E7EB;
      --danger:       #EF4444;
      --success:      #22C55E;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ──────────────────────────────────────────── */
    .login-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.3);
    }

    /* ── Logo area ──────────────────────────────────────── */
    .admin-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .admin-logo-icon {
      width: 52px; height: 52px;
      background: var(--brand);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-logo-icon svg { width: 28px; height: 28px; }
    .admin-logo-text { font-size: 22px; font-weight: 800; color: var(--text-dark); }
    .admin-logo-badge {
      background: var(--brand);
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .login-heading { font-size: 24px; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-mid); margin-bottom: 28px; }

    /* ── Fields ─────────────────────────────────────────── */
    .field-group { margin-bottom: 16px; }
    .field-label { font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 6px; display: block; }
    .field-input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px; font-family: inherit;
      color: var(--text-dark); background: var(--surface);
      outline: none; transition: border-color .2s;
    }
    .field-input:focus { border-color: var(--brand); }
    .field-input::placeholder { color: var(--text-light); }
    .field-input.error { border-color: var(--danger); }
    .pw-wrap { position: relative; }
    .pw-wrap .field-input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-light);
    }
    .pw-toggle svg { width: 18px; height: 18px; }

    /* ── Error ──────────────────────────────────────────── */
    .error-banner {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: #991B1B; font-weight: 500;
      margin-bottom: 16px; display: none;
      animation: shake .3s ease;
    }
    .error-banner.show { display: block; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
    }

    /* ── Submit button ──────────────────────────────────── */
    .btn-login {
      width: 100%; padding: 14px;
      background: var(--brand); color: #fff;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: background .15s, transform .1s;
      position: relative;
    }
    .btn-login:hover  { background: var(--brand-dark); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .btn-login.loading::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%;
      right: 18px; top: 50%; transform: translateY(-50%);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Trust indicators ───────────────────────────────── */
    .trust-row {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .trust-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-light); font-weight: 500; }
    .trust-item svg { width: 14px; height: 14px; opacity: .5; }

    /* ── 2FA reminder badge ─────────────────────────────── */
    .access-notice {
      background: #F0FDF4; border: 1px solid #86EFAC;
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #166534; font-weight: 500;
      margin-bottom: 20px; display: flex; align-items: flex-start; gap: 8px;
    }
    .access-notice svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }

    /* ── Watermark at bottom ────────────────────────────── */
    .bg-watermark {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,.25); font-weight: 500;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Logo -->
    <div class="admin-logo">
      <div class="admin-logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="admin-logo-text">HandyHub</div>
        <span class="admin-logo-badge">Admin Console</span>
      </div>
    </div>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to access the admin dashboard.</p>

    <!-- Access notice -->
    <div class="access-notice">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#166534" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Access is restricted to authorised HandyHub administrators only.</span>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Form -->
    <div class="field-group">
      <label class="field-label">Admin Email</label>
      <input class="field-input" type="email" id="email" placeholder="admin@handyhub.com" autocomplete="email" />
    </div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <div class="pw-wrap">
        <input class="field-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" />
        <button type="button" class="pw-toggle" onclick="togglePw()">
          <svg id="pw-icon" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="handleLogin()">Sign In to Admin</button>

    <!-- Trust indicators -->
    <div class="trust-row">
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Encrypted
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="1.8"/></svg>
        Auth-Gated
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Audit Logged
      </div>
    </div>

  </div>

  <p class="bg-watermark">HandyHub Admin Console · Restricted Access</p>

<script type="module">
import { auth, db } from './js/firebase-admin.js';
import {
  signInWithEmailAndPassword,
  onAuthStateChanged,
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { doc, getDoc, setDoc, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
import { SUPER_ADMIN_EMAILS } from './js/auth-guard.js';

/* ── If already logged in as admin, skip to dashboard ───────────────────── */
onAuthStateChanged(auth, async user => {
  if (!user) return;
  if (SUPER_ADMIN_EMAILS.includes(user.email)) {
    location.href = 'index.html'; return;
  }
  const snap = await getDoc(doc(db, 'admins', user.uid)).catch(() => null);
  if (snap?.exists() && snap.data().status === 'active') {
    location.href = 'index.html';
  }
});

/* ── Login handler ───────────────────────────────────────────────────────── */
window.handleLogin = async function () {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw    = document.getElementById('password').value;
  clearError();

  if (!email || !email.includes('@')) { showError('Please enter a valid email address.'); return; }
  if (!pw)                             { showError('Please enter your password.'); return; }

  setLoading(true);

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pw);
    const user = cred.user;

    /* Verify this is actually an admin */
    const isHardcoded = SUPER_ADMIN_EMAILS.includes(user.email);
    if (!isHardcoded) {
      const snap = await getDoc(doc(db, 'admins', user.uid)).catch(() => null);
      if (!snap?.exists() || snap.data().status !== 'active') {
        await auth.signOut();
        showError('Access denied. This account does not have admin privileges.');
        setLoading(false);
        return;
      }
    }

    /* Log the admin sign-in for audit trail */
    await setDoc(doc(db, 'admin_sessions', user.uid), {
      adminEmail:  user.email,
      adminUid:    user.uid,
      lastLoginAt: serverTimestamp(),
      userAgent:   navigator.userAgent,
    }, { merge: true }).catch(() => {});

    location.href = 'index.html';
  } catch (err) {
    setLoading(false);
    const msg =
      err.code === 'auth/invalid-credential'  ||
      err.code === 'auth/wrong-password'       ||
      err.code === 'auth/user-not-found'
        ? 'Incorrect email or password.'
      : err.code === 'auth/too-many-requests'
        ? 'Too many failed attempts. Please wait a few minutes and try again.'
      : err.code === 'auth/user-disabled'
        ? 'This admin account has been disabled.'
        : 'Sign-in failed: ' + err.message;
    showError(msg);
  }
};

/* ── Enter key support ───────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.handleLogin();
});

/* ── Password toggle ─────────────────────────────────────────────────────── */
window.togglePw = function () {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('pw-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
  } else {
    inp.type = 'password';
    icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>`;
  }
};

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function showError(msg) {
  const b = document.getElementById('error-banner');
  b.textContent = msg;
  b.classList.add('show');
  /* re-trigger animation */
  b.style.animation = 'none';
  requestAnimationFrame(() => { b.style.animation = ''; });
}
function clearError() {
  document.getElementById('error-banner').classList.remove('show');
}
function setLoading(on) {
  const btn = document.getElementById('login-btn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  btn.textContent = on ? 'Signing in…' : 'Sign In to Admin';
}
</script>
</body>
</html>
